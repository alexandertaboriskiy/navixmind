    ctx.fillRect(side * 4 - 2, 12 + Math.sin(ph) * 1, 4, 6);
  }
  // Golden headdress (striped trapezoid)
  ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#b8960a'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-12, -4); ctx.lineTo(-10, -18); ctx.lineTo(10, -18); ctx.lineTo(12, -4);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Headdress stripes
  ctx.strokeStyle = '#2244aa'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 4; i++) {
    const sy = -16 + i * 3.5;
    ctx.beginPath(); ctx.moveTo(-11 + i * 0.4, sy); ctx.lineTo(11 - i * 0.4, sy); ctx.stroke();
  }
  // Face
  ctx.fillStyle = '#c8a060';
  ctx.beginPath(); ctx.arc(0, -8, 6, 0, Math.PI * 2); ctx.fill();
  // Jeweled eyes
  ctx.fillStyle = '#00ffaa'; ctx.shadowColor = '#00ffaa'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(-2, -9, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -9, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Golden staff in right hand
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(14, -20); ctx.stroke();
  ctx.fillStyle = '#00ccff'; ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.arc(14, -22, 3, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ----- 16. SHADOW ASSASSIN — near-invisible dark assassin -----
function drawShadow(ctx, t, m) {
  // Very low alpha
  ctx.globalAlpha = 0.45 + Math.sin(t * 3) * 0.1;
  // Smoke trail below
  for (let i = 0; i < 5; i++) {
    const sx = Math.sin(t * 2 + i * 1.6) * 6;
    const sy = 10 + i * 3;
    ctx.fillStyle = `rgba(40,0,60,${0.15 - i * 0.025})`;
    ctx.beginPath(); ctx.arc(sx, sy, 3 - i * 0.4, 0, Math.PI * 2); ctx.fill();
  }
  // Dark purple/black body silhouette
  ctx.fillStyle = '#1a0028';
  ctx.beginPath();
  ctx.moveTo(-8, 10); ctx.lineTo(-10, -2); ctx.quadraticCurveTo(-6, -14, 0, -16);
  ctx.quadraticCurveTo(6, -14, 10, -2); ctx.lineTo(8, 10);
  ctx.closePath(); ctx.fill();
  // Shadow particles
  for (let i = 0; i < 4; i++) {
    const px = Math.sin(t * 3 + i * 2) * 12;
    const py = Math.cos(t * 2.5 + i * 1.5) * 10;
    ctx.fillStyle = 'rgba(60,0,80,0.3)';
    ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // Two glowing red eyes (clearly visible)
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#ff2222'; ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(-3, -8, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -8, 2, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Kunai/blade in hand (triangle)
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#666';
  ctx.save();
  ctx.translate(10, 0);
  ctx.rotate(Math.sin(t * 2) * 0.2);
  ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(2, 2); ctx.lineTo(-2, 2); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ----- 17. BONE KING — skeleton king with crown and staff -----
function drawBone(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 13, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Floating bone fragments
  for (let i = 0; i < 4; i++) {
    const bx = Math.sin(t * 1.8 + i * 2.3) * 16;
    const by = Math.cos(t * 1.4 + i * 1.9) * 12;
    ctx.fillStyle = 'rgba(230,220,200,0.5)';
    ctx.fillRect(bx - 1.5, by - 1, 3, 2);
  }
  // Spine
  ctx.strokeStyle = '#e8e0d0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(0, 10); ctx.stroke();
  // Vertebrae
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = '#ddd8c8';
    ctx.fillRect(-2, -4 + i * 4, 4, 2);
  }
  // Ribcage
  ctx.strokeStyle = '#ddd8c8'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    for (let side = -1; side <= 1; side += 2) {
      ctx.beginPath();
      ctx.moveTo(0, -2 + i * 3);
      ctx.quadraticCurveTo(side * 6, -3 + i * 3, side * 8, 0 + i * 3);
      ctx.stroke();
    }
  }
  // Legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 4 + (side > 0 ? Math.PI : 0);
    ctx.strokeStyle = '#e0d8c0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(side * 3, 10); ctx.lineTo(side * 4, 18 + Math.sin(ph) * 1); ctx.stroke();
  }
  // Skull head
  ctx.fillStyle = '#f0ece0';
  ctx.beginPath(); ctx.arc(0, -10, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath(); ctx.moveTo(-4, -6); ctx.lineTo(0, -3); ctx.lineTo(4, -6); ctx.fill(); // jaw
  // Eye sockets with green glow
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(-2.5, -11, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.5, -11, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#44ff44'; ctx.shadowColor = '#44ff44'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(-2.5, -11, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.5, -11, 1, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Jagged crown
  ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#b8960a'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-6, -15); ctx.lineTo(-5, -20); ctx.lineTo(-2, -16); ctx.lineTo(0, -21);
  ctx.lineTo(2, -16); ctx.lineTo(5, -20); ctx.lineTo(6, -15);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Bone staff with green orb (left hand)
  ctx.strokeStyle = '#e0d8c0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-14, -18); ctx.stroke();
  ctx.fillStyle = '#44ff44'; ctx.shadowColor = '#44ff44'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(-14, -20, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ----- 18. LAVA GOLEM — molten rock golem -----
function drawLava(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 14, 15, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Lava particles rising
  for (let i = 0; i < 5; i++) {
    const px = Math.sin(t * 2 + i * 1.9) * 12;
    const py = -8 - ((t * 12 + i * 15) % 20);
    ctx.fillStyle = `rgba(255,${100 + i * 20},0,${0.5 - i * 0.08})`;
    ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // Chunky rock legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 3 + (side > 0 ? Math.PI : 0);
    ctx.fillStyle = '#4a4040';
    ctx.fillRect(side * 5 - 3.5, 8 + Math.sin(ph) * 1, 7, 8);
    // Lava crack on legs
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(side * 5, 9); ctx.lineTo(side * 5 + 1, 14); ctx.stroke();
  }
  // Dark gray rocky body
  ctx.fillStyle = '#4a4040'; ctx.strokeStyle = '#3a3030'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-12, 8); ctx.lineTo(-14, -4); ctx.lineTo(-8, -10);
  ctx.lineTo(8, -10); ctx.lineTo(14, -4); ctx.lineTo(12, 8);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Orange/red glowing fissures (cracks)
  ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 1.5; ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.moveTo(-6, -8); ctx.lineTo(-3, 0); ctx.lineTo(-7, 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4, -7); ctx.lineTo(6, -1); ctx.lineTo(3, 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-1, -5); ctx.lineTo(1, 3); ctx.stroke();
  ctx.shadowBlur = 0;
  // Head (rocky lump)
  ctx.fillStyle = '#555050';
  ctx.beginPath(); ctx.arc(0, -13, 7, 0, Math.PI * 2); ctx.fill();
  // Glowing orange eyes
  ctx.fillStyle = '#ff8800'; ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(-3, -14, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -14, 2, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Rock chunk arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#4a4040';
    ctx.save();
    ctx.translate(side * 13, -2);
    ctx.rotate(side * (0.3 + Math.sin(t * 2) * 0.15));
    ctx.fillRect(0, -3, side * 10, 6);
    ctx.fillStyle = '#555050';
    ctx.beginPath(); ctx.arc(side * 10, 0, 4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  // Magma drip from body
  ctx.fillStyle = 'rgba(255,100,0,0.4)';
  const dripY = 8 + Math.sin(t * 2) * 2;
  ctx.beginPath(); ctx.arc(-3, dripY, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, dripY + 1, 1.5, 0, Math.PI * 2); ctx.fill();
}

// ----- 19. KRAKEN — blue/purple sea monster -----
function drawKraken(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 14, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Water/bubble particles
  for (let i = 0; i < 5; i++) {
    const bx = Math.sin(t * 1.5 + i * 2) * 14;
    const by = Math.cos(t * 1.2 + i * 1.7) * 10 - 4;
    ctx.fillStyle = 'rgba(100,180,255,0.3)';
    ctx.beginPath(); ctx.arc(bx, by, 1.5 + Math.sin(t + i) * 0.5, 0, Math.PI * 2); ctx.fill();
  }
  // 6 tentacles writhing below
  for (let i = 0; i < 6; i++) {
    const bx = -10 + i * 4;
    const wave = Math.sin(t * 3 + i * 1.1) * 5;
    const wave2 = Math.sin(t * 2.5 + i * 1.4) * 3;
    ctx.strokeStyle = i % 2 === 0 ? '#3a2070' : '#4a3080';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(bx, 4);
    ctx.quadraticCurveTo(bx + wave, 14, bx + wave2, 24 + Math.sin(t * 2 + i) * 2);
    ctx.stroke();
    // Suction cups
    ctx.fillStyle = '#6a50a0';
    ctx.beginPath(); ctx.arc(bx + wave2 * 0.5, 14, 1, 0, Math.PI * 2); ctx.fill();
  }
  // Bulbous head (dark blue/purple)
  const headGrad = ctx.createRadialGradient(0, -4, 3, 0, -4, 14);
  headGrad.addColorStop(0, '#5040a0');
  headGrad.addColorStop(0.7, '#3a2880');
  headGrad.addColorStop(1, '#2a1860');
  ctx.fillStyle = headGrad;
  ctx.beginPath(); ctx.ellipse(0, -4, 14, 11, 0, 0, Math.PI * 2); ctx.fill();
  // Bioluminescent spots
  for (let i = 0; i < 6; i++) {
    const sx = Math.sin(i * 1.5 + 0.5) * 8;
    const sy = -4 + Math.cos(i * 1.2 + 0.3) * 6;
    ctx.fillStyle = `rgba(100,200,255,${0.3 + Math.sin(t * 2 + i) * 0.15})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // Large pale eyes with slit pupils
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#e0e8f0';
    ctx.beginPath(); ctx.ellipse(side * 5, -6, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(side * 5, -6, 1.5, 4, 0, 0, Math.PI * 2); ctx.fill();
  }
  // Beak-like mouth
  ctx.fillStyle = '#2a1040';
  ctx.beginPath();
  ctx.moveTo(-3, 2); ctx.lineTo(0, 6); ctx.lineTo(3, 2);
  ctx.closePath(); ctx.fill();
}

// ----- 20. VOID REAPER — cosmic hooded reaper -----
function drawVoid(ctx, t, m) {
  // No shadow (floating)
  // Void particles being pulled inward
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + t * 1.2;
    const pullR = 20 - ((t * 8 + i * 10) % 16);
    const px = Math.cos(a) * pullR, py = Math.sin(a) * pullR;
    ctx.fillStyle = `rgba(120,40,180,${0.4 - pullR * 0.015})`;
    ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // Dark purple/black hooded robe shape
  ctx.fillStyle = '#0a0018';
  ctx.beginPath();
  ctx.moveTo(-10, 14);
  ctx.quadraticCurveTo(-14, 4, -10, -6);
  ctx.quadraticCurveTo(-8, -16, 0, -18);
  ctx.quadraticCurveTo(8, -16, 10, -6);
  ctx.quadraticCurveTo(14, 4, 10, 14);
  ctx.lineTo(6 + Math.sin(t * 3) * 2, 18);
  ctx.lineTo(-6 + Math.sin(t * 3 + 1) * 2, 18);
  ctx.closePath(); ctx.fill();
  // Starfield particles inside the robe
  ctx.save();
  ctx.clip();
  for (let i = 0; i < 15; i++) {
    const sx = (Math.sin(i * 3.7 + t * 0.3) * 8);
    const sy = -10 + (Math.cos(i * 2.3 + t * 0.5) * 12);
    const flicker = 0.3 + 0.7 * Math.abs(Math.sin(t * 4 + i * 2.1));
    ctx.fillStyle = `rgba(255,255,255,${flicker * 0.6})`;
    ctx.beginPath(); ctx.arc(sx, sy, 0.8 + Math.sin(t * 3 + i) * 0.3, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // Glowing purple eyes
  ctx.fillStyle = '#bb44ff'; ctx.shadowColor = '#aa22ff'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(-3, -8, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -8, 2, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Scythe shape
  ctx.save();
  ctx.translate(12, -4);
  ctx.rotate(0.2 + Math.sin(t * 2) * 0.1);
  // Handle
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(0, -14); ctx.stroke();
  // Blade
  ctx.fillStyle = '#8844cc'; ctx.shadowColor = '#8844cc'; ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(0, -14); ctx.quadraticCurveTo(8, -16, 10, -10);
  ctx.quadraticCurveTo(6, -8, 0, -8);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ----- 21. TUNNEL TERROR — segmented worm that burrows -----
function drawWorm(ctx, t, m) {
  // Always show above ground (adapted for preso)
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 10, 10, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Segments
  for (let i = 4; i >= 0; i--) {
    const sy = 6 - i * 5;
    const wave = Math.sin(t * 4 + i * 0.8) * 2;
    const r = 5 + (i === 0 ? 2 : i === 4 ? -1 : 0);
    ctx.fillStyle = i % 2 === 0 ? '#a07040' : '#8a5a30';
    ctx.beginPath(); ctx.arc(wave, sy, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#6a4020'; ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  // Head
  ctx.fillStyle = '#b08050';
  ctx.beginPath(); ctx.arc(0, -14, 7, 0, Math.PI * 2); ctx.fill();
  // Mandibles
  const open = Math.sin(t * 5) * 0.3;
  ctx.strokeStyle = '#6a3a20'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-3, -17); ctx.lineTo(-6, -22 - open * 3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, -17); ctx.lineTo(6, -22 - open * 3); ctx.stroke();
  // Eyes
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(-3, -16, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -16, 1.5, 0, Math.PI * 2); ctx.fill();
}

// ----- 22. IRON TITAN — massive armored giant -----
function drawTitan(ctx, t, m) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 16, 20, 6, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 2 + (side > 0 ? Math.PI : 0);
    ctx.fillStyle = '#555'; ctx.fillRect(side * 8 - 5, 6 + Math.sin(ph) * 2, 10, 12);
    ctx.fillStyle = '#444'; ctx.fillRect(side * 8 - 6, 16, 12, 4);
  }
  // Body
  ctx.fillStyle = '#666'; ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-14, 8); ctx.lineTo(-16, -8); ctx.lineTo(16, -8); ctx.lineTo(14, 8); ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Armor plates
  ctx.fillStyle = '#777';
  ctx.fillRect(-12, -4, 24, 4);
  ctx.fillStyle = '#888';
  ctx.fillRect(-10, -6, 20, 3);
  // Arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.save(); ctx.translate(side * 14, -2);
    ctx.rotate(side * (0.3 + Math.sin(t * 2) * 0.15));
    ctx.fillStyle = '#555'; ctx.fillRect(0, -3, side * 14, 6);
    ctx.fillStyle = '#777'; ctx.beginPath(); ctx.arc(side * 14, 0, 5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  // Head
  ctx.fillStyle = '#777';
  ctx.fillRect(-8, -18, 16, 12);
  ctx.fillStyle = '#555'; ctx.fillRect(-9, -14, 18, 3);
  // Visor
  ctx.fillStyle = '#ff3300';
  ctx.fillRect(-5, -15, 10, 2);
  // Horns
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.moveTo(-7, -18); ctx.lineTo(-10, -24); ctx.lineTo(-4, -18); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7, -18); ctx.lineTo(10, -24); ctx.lineTo(4, -18); ctx.fill();
}

// ----- 23. VAMPIRE LORD — bat-winged flying creature -----
function drawBat(ctx, t, m) {
  const hover = Math.sin(t * 3) * 4;
  ctx.translate(0, hover);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, 14 - hover, 12, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Wings
  const wingFlap = Math.sin(t * 6) * 0.4;
  for (let side = -1; side <= 1; side += 2) {
    ctx.save(); ctx.scale(side, 1);
    ctx.fillStyle = '#3a1840';
    ctx.beginPath();
    ctx.moveTo(4, -4);
    ctx.quadraticCurveTo(20, -20 + wingFlap * 15, 28, -8 + wingFlap * 10);
    ctx.quadraticCurveTo(22, -2, 16, 2);
    ctx.quadraticCurveTo(10, -6, 4, -4);
    ctx.fill();
    // Wing membrane lines
    ctx.strokeStyle = '#2a0830'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(6, -4); ctx.lineTo(22, -14 + wingFlap * 12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6, -2); ctx.lineTo(20, -6 + wingFlap * 8); ctx.stroke();
    ctx.restore();
  }
  // Body
  ctx.fillStyle = '#4a2050';
  ctx.beginPath(); ctx.ellipse(0, 0, 7, 10, 0, 0, Math.PI * 2); ctx.fill();
  // Head
  ctx.fillStyle = '#5a2860';
  ctx.beginPath(); ctx.arc(0, -10, 6, 0, Math.PI * 2); ctx.fill();
  // Ears
  ctx.fillStyle = '#4a2050';
  ctx.beginPath(); ctx.moveTo(-4, -14); ctx.lineTo(-7, -20); ctx.lineTo(-1, -14); ctx.fill();
  ctx.beginPath(); ctx.moveTo(4, -14); ctx.lineTo(7, -20); ctx.lineTo(1, -14); ctx.fill();
  // Eyes (red glowing)
  ctx.fillStyle = '#ff2222';
  ctx.beginPath(); ctx.arc(-2.5, -11, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.5, -11, 1.5, 0, Math.PI * 2); ctx.fill();
  // Fangs
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.moveTo(-1.5, -7); ctx.lineTo(-1, -4); ctx.lineTo(-0.5, -7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0.5, -7); ctx.lineTo(1, -4); ctx.lineTo(1.5, -7); ctx.fill();
}

// ----- 24. MIRROR MAGE — crystal-robed mage with mirrors -----
function drawClone(ctx, t, m) {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, 12, 10, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Robe
  const shimmer = Math.sin(t * 4) * 0.1;
  ctx.fillStyle = `rgba(100,140,200,${0.8 + shimmer})`;
  ctx.beginPath(); ctx.moveTo(-10, 12); ctx.lineTo(-6, -4); ctx.lineTo(6, -4); ctx.lineTo(10, 12); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#4a6a90'; ctx.lineWidth = 1; ctx.stroke();
  // Mirror shard on chest
  ctx.fillStyle = '#cceeff';
  ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(3, 3); ctx.lineTo(0, 8); ctx.lineTo(-3, 3); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#88bbdd'; ctx.lineWidth = 0.5; ctx.stroke();
  // Head
  ctx.fillStyle = '#d0c0e0';
  ctx.beginPath(); ctx.arc(0, -8, 5, 0, Math.PI * 2); ctx.fill();
  // Hood
  ctx.fillStyle = '#6080b0';
  ctx.beginPath(); ctx.arc(0, -8, 6, Math.PI, 0); ctx.closePath(); ctx.fill();
  // Eyes
  ctx.fillStyle = '#44aaff';
  ctx.beginPath(); ctx.arc(-2, -8, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -8, 1.2, 0, Math.PI * 2); ctx.fill();
  // Floating mirror shards orbiting
  for (let i = 0; i < 3; i++) {
    const a = t * 2 + (i / 3) * Math.PI * 2;
    const ox = Math.cos(a) * 16, oy = Math.sin(a) * 10 - 4;
    ctx.fillStyle = 'rgba(180,220,255,0.6)';
    ctx.save(); ctx.translate(ox, oy); ctx.rotate(a);
    ctx.fillRect(-3, -4, 6, 8);
    ctx.strokeStyle = 'rgba(100,180,255,0.8)'; ctx.lineWidth = 0.5; ctx.strokeRect(-3, -4, 6, 8);
    ctx.restore();
  }
  // Always fully visible in preso
}

// ----- 25. SCARAB EMPEROR — armored beetle -----
function drawBeetle(ctx, t, m) {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 12, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Legs (6)
  ctx.strokeStyle = '#2a3a20'; ctx.lineWidth = 2;
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 3; i++) {
      const by = -2 + i * 5;
      const ph = t * 4 + i + (side > 0 ? Math.PI : 0);
      ctx.beginPath(); ctx.moveTo(side * 10, by);
      ctx.lineTo(side * (16 + Math.sin(ph) * 2), by + 4); ctx.stroke();
    }
  }
  // Shell
  const shellGrad = ctx.createLinearGradient(0, -12, 0, 8);
  shellGrad.addColorStop(0, '#4a7a40'); shellGrad.addColorStop(1, '#2a4a20');
  ctx.fillStyle = shellGrad;
  ctx.beginPath(); ctx.ellipse(0, -2, 13, 12, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1a3a10'; ctx.lineWidth = 1; ctx.stroke();
  // Shell ridge
  ctx.strokeStyle = '#5a8a50'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 8); ctx.stroke();
  // Gold spots
  ctx.fillStyle = '#c8a840';
  ctx.beginPath(); ctx.arc(-5, -6, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -4, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-3, 2, 1.5, 0, Math.PI * 2); ctx.fill();
  // Head
  ctx.fillStyle = '#3a5a30';
  ctx.beginPath(); ctx.arc(0, -14, 5, 0, Math.PI * 2); ctx.fill();
  // Horns
  ctx.fillStyle = '#c8a840';
  ctx.beginPath(); ctx.moveTo(-3, -17); ctx.lineTo(-2, -24); ctx.lineTo(0, -17); ctx.fill();
  ctx.beginPath(); ctx.moveTo(3, -17); ctx.lineTo(2, -24); ctx.lineTo(0, -17); ctx.fill();
  // Eyes
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(-2, -15, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -15, 1.2, 0, Math.PI * 2); ctx.fill();
}

// ----- 26. CYCLONE KING — spinning wind elemental -----
function drawTwister(ctx, t, m) {
  const rampage = false;
  const spinMult = rampage ? 3 : 1;
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(0, 14, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Tornado body — stacked spinning rings (faster during rampage)
  const ringCount = rampage ? 10 : 7;
  for (let i = 0; i < ringCount; i++) {
    const y = 10 - i * 4;
    const r = 4 + i * 1.8;
    const spin = t * (6 + i * 0.5) * spinMult + i * 0.8;
    const wobble = Math.sin(spin) * (rampage ? 4 : 2);
    const alpha = rampage ? (0.4 + i * 0.06) : (0.3 + i * 0.08);
    ctx.strokeStyle = rampage ? `rgba(100,220,100,${alpha})` : `rgba(150,200,220,${alpha})`;
    ctx.lineWidth = 2.5 - i * 0.15;
    ctx.beginPath(); ctx.ellipse(wobble, y, r, r * 0.35, 0, 0, Math.PI * 2); ctx.stroke();
  }
  // Core glow (green during rampage)
  ctx.fillStyle = rampage ? 'rgba(100,240,100,0.5)' : 'rgba(180,220,240,0.4)';
  ctx.beginPath(); ctx.ellipse(0, -4, 6, 16, 0, 0, Math.PI * 2); ctx.fill();
  // Eye of the storm
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, -10, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = rampage ? '#44cc44' : '#4488cc';
  ctx.beginPath(); ctx.arc(0, -10, 2, 0, Math.PI * 2); ctx.fill();
  // Debris particles (more during rampage)
  const debrisCount = rampage ? 8 : 4;
  for (let i = 0; i < debrisCount; i++) {
    const da = t * 5 * spinMult + i * 1.5;
    const dr = 8 + i * 3;
    const dy = -4 + i * 4;
    ctx.fillStyle = rampage ? 'rgba(80,180,80,0.6)' : 'rgba(140,120,80,0.5)';
    ctx.fillRect(Math.cos(da) * dr - 1, dy + Math.sin(da) * 2 - 1, 3, 3);
  }
}

// ----- 27. NEON JELLYFISH — floating electric jellyfish -----
function drawJelly(ctx, t, m) {
  const hover = Math.sin(t * 2) * 5;
  ctx.translate(0, hover);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(0, 16 - hover, 10, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Tentacles
  const tentColors = ['#ff44aa', '#44ffaa', '#44aaff', '#ffaa44', '#aa44ff'];
  for (let i = 0; i < 5; i++) {
    const tx = -6 + i * 3;
    ctx.strokeStyle = tentColors[i]; ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.6 + Math.sin(t * 3 + i) * 0.2;
    ctx.beginPath(); ctx.moveTo(tx, 6);
    const wave1 = Math.sin(t * 2.5 + i * 1.3) * 4;
    const wave2 = Math.sin(t * 2 + i * 0.9) * 3;
    ctx.quadraticCurveTo(tx + wave1, 14, tx + wave2, 22);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // Bell
  const pulse = 1 + Math.sin(t * 3) * 0.08;
  const bellGrad = ctx.createRadialGradient(0, -2, 2, 0, -2, 14 * pulse);
  bellGrad.addColorStop(0, 'rgba(255,100,255,0.8)');
  bellGrad.addColorStop(0.5, 'rgba(100,200,255,0.5)');
  bellGrad.addColorStop(1, 'rgba(60,100,200,0.2)');
  ctx.fillStyle = bellGrad;
  ctx.beginPath(); ctx.arc(0, -2, 12 * pulse, Math.PI, 0); ctx.closePath(); ctx.fill();
  // Inner glow pattern
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(0, -5, 5, Math.PI, 0); ctx.closePath(); ctx.fill();
  // Neon dots
  for (let i = 0; i < 4; i++) {
    const dx = -6 + i * 4, dy = -4 + (i % 2) * 3;
    const c = tentColors[i];
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(dx, dy, 1.2 + Math.sin(t * 4 + i) * 0.5, 0, Math.PI * 2); ctx.fill();
  }
}

// ----- 28. THORN KING — giant cactus warrior -----
function drawCactus(ctx, t, m) {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 14, 14, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Body — wide cactus trunk
  ctx.fillStyle = '#2a7a2a'; ctx.strokeStyle = '#1a5a1a'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-10, 12); ctx.lineTo(-12, -6); ctx.quadraticCurveTo(-12, -14, 0, -14);
  ctx.quadraticCurveTo(12, -14, 12, -6); ctx.lineTo(10, 12); ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Vertical ridges
  ctx.strokeStyle = 'rgba(20,80,20,0.4)'; ctx.lineWidth = 0.8;
  for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i * 4, 12); ctx.lineTo(i * 4, -12); ctx.stroke(); }
  // Arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#2a7a2a'; ctx.strokeStyle = '#1a5a1a'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(side * 10, 0);
    ctx.lineTo(side * 18, -2);
    ctx.quadraticCurveTo(side * 20, -8, side * 18, -12);
    ctx.lineTo(side * 14, -10);
    ctx.quadraticCurveTo(side * 14, -4, side * 10, -3);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  // Spines
  ctx.strokeStyle = '#ffee88'; ctx.lineWidth = 1;
  const spines = [[-8,-8],[-4,-12],[0,-14],[4,-12],[8,-8],[-6,0],[6,0],[-7,6],[7,6],[-16,-6],[16,-6],[-16,-10],[16,-10]];
  for (const [sx, sy] of spines) {
    const a = Math.atan2(sy, sx);
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + Math.cos(a) * 4, sy + Math.sin(a) * 4); ctx.stroke();
  }
  // Flower on top
  ctx.fillStyle = '#ff6688';
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 + t * 0.5;
    ctx.beginPath(); ctx.arc(Math.cos(a) * 4, -16 + Math.sin(a) * 3, 2.5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath(); ctx.arc(0, -16, 2, 0, Math.PI * 2); ctx.fill();
  // Face
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-3, -6, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -6, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 1, 3, Math.PI + 0.2, -0.2); ctx.stroke();
}

// ----- 29. FROST EMPEROR — sliding penguin -----
function drawPenguin(ctx, t, m) {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, 10, 8, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Feet
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.ellipse(-3, 10, 3, 1.5, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3, 10, 3, 1.5, 0.2, 0, Math.PI * 2); ctx.fill();
  // Body
  ctx.fillStyle = '#1a1a2a';
  ctx.beginPath(); ctx.ellipse(0, 0, 8, 11, 0, 0, Math.PI * 2); ctx.fill();
  // Belly
  ctx.fillStyle = '#eef8ff';
  ctx.beginPath(); ctx.ellipse(0, 2, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
  // Wings
  for (let side = -1; side <= 1; side += 2) {
    const flap = Math.sin(t * 3 + (side > 0 ? 0 : Math.PI)) * 0.2;
    ctx.save(); ctx.translate(side * 7, -2); ctx.rotate(side * (0.5 + flap));
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath(); ctx.ellipse(0, 4, 3, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  // Head
  ctx.fillStyle = '#1a1a2a';
  ctx.beginPath(); ctx.arc(0, -10, 6, 0, Math.PI * 2); ctx.fill();
  // Eye patches (white)
  ctx.fillStyle = '#eef8ff';
  ctx.beginPath(); ctx.ellipse(-2.5, -11, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.5, -11, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-2.5, -11, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.5, -11, 1, 0, Math.PI * 2); ctx.fill();
  // Beak
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.moveTo(-1.5, -8); ctx.lineTo(0, -5); ctx.lineTo(1.5, -8); ctx.closePath(); ctx.fill();
  // Crown
  ctx.fillStyle = '#44aaff';
  ctx.beginPath(); ctx.moveTo(-4, -15); ctx.lineTo(-2, -20); ctx.lineTo(0, -16); ctx.lineTo(2, -20); ctx.lineTo(4, -15); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#88ddff';
  ctx.beginPath(); ctx.arc(0, -17, 1.2, 0, Math.PI * 2); ctx.fill();
}

// ----- 30. BOOM KING — round bomb-shaped creature -----
function drawBomber(ctx, t, m) {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 12, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 3 + (side > 0 ? Math.PI : 0);
    ctx.fillStyle = '#444';
    ctx.fillRect(side * 4 - 2.5, 6 + Math.sin(ph) * 1.5, 5, 6);
    ctx.fillStyle = '#333';
    ctx.fillRect(side * 4 - 3, 11, 6, 2.5);
  }
  // Body (bomb sphere)
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5; ctx.stroke();
  // Metal band
  ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2); ctx.stroke();
  // Fuse on top
  ctx.strokeStyle = '#8a6a40'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, -12);
  ctx.quadraticCurveTo(4, -18, 0, -20); ctx.stroke();
  // Fuse spark
  const sparkPhase = t * 8;
  ctx.fillStyle = `rgba(255,${150 + Math.sin(sparkPhase) * 100},0,${0.6 + Math.sin(sparkPhase) * 0.4})`;
  ctx.beginPath(); ctx.arc(0 + Math.sin(sparkPhase) * 1, -20, 3 + Math.sin(sparkPhase * 1.5), 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, -20, 1.2, 0, Math.PI * 2); ctx.fill();
  // Face
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(-4, -2, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -2, 2, 0, Math.PI * 2); ctx.fill();
  // Angry mouth
  ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-4, 4); ctx.lineTo(-2, 2); ctx.lineTo(2, 2); ctx.lineTo(4, 4); ctx.stroke();
  // Arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.save(); ctx.translate(side * 11, 0);
    ctx.rotate(side * (0.4 + Math.sin(t * 2.5) * 0.2));
    ctx.fillStyle = '#444'; ctx.fillRect(0, -2, side * 8, 4);
    ctx.fillStyle = '#666'; ctx.beginPath(); ctx.arc(side * 8, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ---- CHAMPION ADAPTER: wraps game champion draw functions for preso ----
function drawChamp(fn, ctx, x, y, time, facing) {
    const bob = Math.sin(time * 1.8) * 3;
    ctx.save();
    ctx.translate(x, y + bob);
    const sc = 1.8;
    ctx.scale(facing * sc, sc);
    const m = { champPhase: 'idle', facing: facing, speed: 1, flashTimer: 0, bounceHeight: 0, isClone: false, mimicTransform: false };
    fn(ctx, time, m);
    ctx.restore();
}

// ---- DISPATCH: draw any monster by type ----
function drawBoss(ctx, x, y, type, time, facing) {
    switch (type) {
        case 'necromancer': drawNecromancer(ctx, x, y, time, facing); break;
        case 'vampire':     drawVampire(ctx, x, y, time, facing); break;
        case 'lich':        drawLich(ctx, x, y, time, facing); break;
        case 'gargoyle':    drawGargoyle(ctx, x, y, time, facing); break;
        case 'knight':      drawKnight(ctx, x, y, time, facing); break;
        case 'green': case 'blue': case 'red': case 'yellow':
            drawZombie(ctx, x, y, type, time, facing); break;
        // Game champions (via adapter):
        case 'scorpion':  drawChamp(drawScorpion, ctx, x, y, time, facing); break;
        case 'eye':       drawChamp(drawEye, ctx, x, y, time, facing); break;
        case 'slime':     drawChamp(drawSlime, ctx, x, y, time, facing); break;
        case 'mimic':     drawChamp(drawMimic, ctx, x, y, time, facing); break;
        case 'wraith':    drawChamp(drawWraith, ctx, x, y, time, facing); break;
        case 'clockwork': drawChamp(drawClockwork, ctx, x, y, time, facing); break;
        case 'mushroom':  drawChamp(drawMushroom, ctx, x, y, time, facing); break;
        case 'crystal':   drawChamp(drawCrystal, ctx, x, y, time, facing); break;
        case 'spider':    drawChamp(drawSpider, ctx, x, y, time, facing); break;
        case 'djinn':     drawChamp(drawDjinn, ctx, x, y, time, facing); break;
        case 'frost':     drawChamp(drawFrost, ctx, x, y, time, facing); break;
        case 'rat':       drawChamp(drawRat, ctx, x, y, time, facing); break;
        case 'thunder':   drawChamp(drawThunder, ctx, x, y, time, facing); break;
        case 'blood':     drawChamp(drawBlood, ctx, x, y, time, facing); break;
        case 'pharaoh':   drawChamp(drawPharaoh, ctx, x, y, time, facing); break;
        case 'shadow':    drawChamp(drawShadow, ctx, x, y, time, facing); break;
        case 'bone':      drawChamp(drawBone, ctx, x, y, time, facing); break;
        case 'lava':      drawChamp(drawLava, ctx, x, y, time, facing); break;
        case 'kraken':    drawChamp(drawKraken, ctx, x, y, time, facing); break;
        case 'void':      drawChamp(drawVoid, ctx, x, y, time, facing); break;
        case 'worm':      drawChamp(drawWorm, ctx, x, y, time, facing); break;
        case 'titan':     drawChamp(drawTitan, ctx, x, y, time, facing); break;
        case 'bat':       drawChamp(drawBat, ctx, x, y, time, facing); break;
        case 'clone':     drawChamp(drawClone, ctx, x, y, time, facing); break;
        case 'beetle':    drawChamp(drawBeetle, ctx, x, y, time, facing); break;
        case 'twister':   drawChamp(drawTwister, ctx, x, y, time, facing); break;
        case 'jelly':     drawChamp(drawJelly, ctx, x, y, time, facing); break;
        case 'cactus':    drawChamp(drawCactus, ctx, x, y, time, facing); break;
        case 'penguin':   drawChamp(drawPenguin, ctx, x, y, time, facing); break;
        case 'bomber':    drawChamp(drawBomber, ctx, x, y, time, facing); break;
        default:          drawNecromancer(ctx, x, y, time, facing); break;
    }
}

// ==================== SLIDE MONSTER LAYOUTS ====================
// Always one monster on left + one on right, with varied vertical positions and types
const MONSTER_TYPES = ['necromancer','vampire','lich','gargoyle','scorpion','eye','slime','mimic','wraith','clockwork','mushroom','crystal','spider','djinn','frost','rat','thunder','blood','pharaoh','shadow','bone','lava','kraken','void','worm','titan','bat','clone','beetle','twister','jelly','cactus','penguin','bomber','green','blue','red','yellow','knight'];

// Speech type alias for champion types that don't have dedicated speech yet
const SPEECH_ALIAS = {
    scorpion:'gargoyle', eye:'wraith', mimic:'slime', clockwork:'knight', mushroom:'troll',
    crystal:'wraith', spider:'spider_queen', djinn:'demon', frost:'knight', rat:'green',
    thunder:'minotaur', blood:'vampire', pharaoh:'mummy', shadow:'dark_elf', bone:'skeleton_mage',
    lava:'demon', kraken:'ghost_pirate', void:'wraith', worm:'troll', titan:'minotaur',
    bat:'vampire', clone:'witch', beetle:'gargoyle', twister:'banshee', jelly:'slime',
    cactus:'troll', penguin:'knight', bomber:'troll'
};

const LEFT_POSITIONS = [
    { left:'0px', bottom:'90px',  w:120, h:180 },
    { left:'0px', bottom:'160px', w:120, h:180 },
    { left:'0px', bottom:'240px', w:120, h:180 },
    { left:'0px', bottom:'320px', w:120, h:180 },
    { left:'0px', top:'80px',     w:120, h:180 },
    { left:'0px', top:'180px',    w:120, h:180 },
    { left:'0px', top:'35%',      w:120, h:180 },
];
const RIGHT_POSITIONS = [
    { right:'0px', bottom:'90px',  w:120, h:180 },
    { right:'0px', bottom:'160px', w:120, h:180 },
    { right:'0px', bottom:'240px', w:120, h:180 },
    { right:'0px', bottom:'320px', w:120, h:180 },
    { right:'0px', top:'80px',     w:120, h:180 },
    { right:'0px', top:'180px',    w:120, h:180 },
    { right:'0px', top:'35%',      w:120, h:180 },
];

function seededRand(seed) {
    let s = seed;
    return function() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

function getSlideMonsters(slideIndex) {
    const s = SLIDES[slideIndex];
    const rng = seededRand(s.id * 7 + 13);
    // Warm up the RNG — first calls produce tiny values because seeds are small
    rng(); rng(); rng();
    const gallery = s.gallery;
    const galleryType = GALLERY_MONSTERS[gallery];

    // Always pick one left monster and one right monster
    const leftPos = LEFT_POSITIONS[Math.floor(rng() * LEFT_POSITIONS.length)];
    const rightPos = RIGHT_POSITIONS[Math.floor(rng() * RIGHT_POSITIONS.length)];

    // Left monster type — gallery type most common, others mixed in
    let leftType;
    const rl = rng();
    if (rl < 0.35) leftType = galleryType;
    else leftType = MONSTER_TYPES[Math.floor(rng() * MONSTER_TYPES.length)];

    // Right monster type — always different from left
    let rightType;
    const rr = rng();
    if (rr < 0.35) rightType = galleryType;
    else rightType = MONSTER_TYPES[Math.floor(rng() * MONSTER_TYPES.length)];
    if (rightType === leftType) {
        const opts = MONSTER_TYPES.filter(t => t !== leftType);
        rightType = opts[Math.floor(rng() * opts.length)];
    }

    return [
        { type: leftType, posStyle: leftPos, facing: 1, seed: rng(), side: 'left' },
        { type: rightType, posStyle: rightPos, facing: -1, seed: rng(), side: 'right' }
    ];
}

// ==================== RENDERING & STATE ====================
let currentSlide = 0;
let startTime = performance.now();
let currentMonsters = [];
let monsterCanvases = [];
let bubbleEls = [];

// ---- RARE ATTACK SYSTEM ----
const ATTACK_SHOUTS = ['ARRGHH!','TAKE THIS!','RAAARGH!','HYAAA!','POW!','FEEL MY WRATH!','EAT THIS!','BOOM!','GRAAAH!','BEGONE!'];
const ATTACK_COLORS = {
    necromancer:'#b44aff', vampire:'#ff2020', lich:'#00ff88', gargoyle:'#aaa',
    scorpion:'#ff4444', eye:'#a040ff', slime:'#44ff44', mimic:'#ffcc00',
    wraith:'#44aaff', clockwork:'#ff8800', mushroom:'#88aa44', crystal:'#44ffff',
    spider:'#ff44ff', djinn:'#ff6600', frost:'#44ddff', rat:'#88ff44',
    thunder:'#ffff44', blood:'#ff0000', pharaoh:'#ffd700', shadow:'#8844cc',
    bone:'#44ff44', lava:'#ff4400', kraken:'#4444ff', void:'#aa22ff',
    worm:'#aa6633', titan:'#ff3300', bat:'#ff2222', clone:'#44aaff',
    beetle:'#c8a840', twister:'#88ddbb', jelly:'#ff44aa', cactus:'#88ff44',
    penguin:'#44aaff', bomber:'#ff8800',
    green:'#44ff44', blue:'#4444ff', red:'#ff4444', yellow:'#ffff44', knight:'#4488ff'
};
let attackState = null;
let lastAttackTime = 0;
let nextAttackDelay = 50 + Math.random() * 70; // 50-120 seconds

function pickSpeech(slideId, monsterType, seed, avoid) {
    // Mix slide-specific and type-specific phrases
    const slideLines = SLIDE_SPEECH[slideId] || [];
    const typeLines = TYPE_SPEECH[monsterType] || TYPE_SPEECH[SPEECH_ALIAS[monsterType]] || TYPE_SPEECH.green;
    // Slide phrases are zombie-themed — only zombies use them often
    // Non-zombie types use their own TYPE_SPEECH 85% of the time
    const isZombie = ['green','blue','red','yellow'].includes(monsterType);
    const slideChance = isZombie ? 0.7 : 0.15;
    const pool = seed < slideChance ? slideLines : typeLines;
    if (pool.length === 0) return "...";
    let pick = pool[Math.floor(seed * 1000) % pool.length];
    // If we need to avoid a duplicate, pick next one in pool
    if (pick === avoid && pool.length > 1) {
        pick = pool[(Math.floor(seed * 1000) + 1) % pool.length];
    }
    return pick;
}

function setupMonsterLayer() {
    const layer = document.getElementById('monster-layer');
    layer.innerHTML = '';
    monsterCanvases = [];
    bubbleEls = [];
    attackState = null; // reset attack on slide change

    currentMonsters = getSlideMonsters(currentSlide);
    const s = SLIDES[currentSlide];

    // Pick speech for all monsters, ensuring no duplicates
    const firstSpeech = pickSpeech(s.id, currentMonsters[0].type, currentMonsters[0].seed);
    currentMonsters[0].speechText = firstSpeech;
    if (currentMonsters.length > 1) {
        currentMonsters[1].speechText = pickSpeech(s.id, currentMonsters[1].type, currentMonsters[1].seed, firstSpeech);
    }

    currentMonsters.forEach((m, i) => {
        const ps = m.posStyle;
        const bubbleH = 60; // extra space at top for speech bubble

        const wrap = document.createElement('div');
        wrap.className = 'monster-wrap monster-' + m.side;
        wrap.style.width = ps.w + 'px';
        wrap.style.height = (ps.h + bubbleH) + 'px';
        // Shift the wrap up by bubbleH so the monster stays in its original position
        Object.keys(ps).forEach(k => {
            if (k !== 'w' && k !== 'h') {
                if (k === 'bottom') {
                    wrap.style.bottom = (parseInt(ps[k]) - bubbleH) + 'px';
                } else if (k === 'top') {
                    const v = ps[k];
                    if (v.includes('%')) wrap.style.top = 'calc(' + v + ' - ' + bubbleH + 'px)';
                    else wrap.style.top = (parseInt(v) - bubbleH) + 'px';
                } else {
                    wrap.style[k] = ps[k];
                }
            }
        });

        const canvas = document.createElement('canvas');
        canvas.width = ps.w;
        canvas.height = ps.h + bubbleH;
        canvas.className = 'monster-canvas';
        wrap.appendChild(canvas);
        monsterCanvases.push(canvas);

        // Store bubble offset (speech already assigned above)
        m.bubbleH = bubbleH;

        layer.appendChild(wrap);
    });
}

function renderSlide(index) {
    const s = SLIDES[index];
    const container = document.getElementById('slide-container');

    document.body.className = 'g' + s.gallery;
    document.getElementById('gallery-label').textContent =
        'Gallery ' + s.gallery + ': ' + s.galleryName;
    document.getElementById('slide-num').textContent = s.id + ' / 42';
    document.getElementById('counter').textContent = s.id + ' / 42';

    document.getElementById('btn-prev').disabled = index === 0;
    document.getElementById('btn-next').disabled = index === SLIDES.length - 1;

    container.innerHTML = `
        <div class="slide-header">
            <h1>${s.title}</h1>
            <div class="meta">
                <span class="artist">${s.artist}</span>
                <span class="year">${s.year}</span>
            </div>
        </div>
        <div class="slide-body">
            <div class="painting-frame">
                <img src="${s.image}" alt="${s.title} by ${s.artist}"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="placeholder" style="display:none">
                    🎨 Image loading...<br><small>${s.title}</small>
                </div>
            </div>
            <div class="info-panel">
                <div class="fun-fact">${s.funFact}</div>
                <div class="description">
                    ${s.paragraphs.map(p => '<p>' + p + '</p>').join('')}
                </div>
            </div>
        </div>
    `;

    // Detect image orientation and apply layout class
    const slideBody = container.querySelector('.slide-body');
    const img = container.querySelector('.painting-frame img');
    img.addEventListener('load', function() {
        if (this.naturalWidth > this.naturalHeight * 1.15) {
            slideBody.classList.add('landscape');
            if (index % 2 === 1) slideBody.classList.add('landscape-right');
        } else {
            // Portrait: alternate image side per slide
            if (index % 2 === 1) slideBody.classList.add('portrait-right');
        }
    });

    setupMonsterLayer();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(dir) {
    const next = currentSlide + dir;
    if (next >= 0 && next < SLIDES.length) {
        currentSlide = next;
        renderSlide(currentSlide);
    }
}

// ==================== MONSTER ANIMATION LOOP ====================
function animateMonsters() {
    const time = (performance.now() - startTime) / 1000;

    // ---- Rare attack check ----
    if (attackState) {
        if (time - attackState.startTime > 2.5) {
            // Attack over — restore original speech
            const am = currentMonsters[attackState.monsterIdx];
            if (am) am.speechText = attackState.origSpeech;
            attackState = null;
        }
    } else if (time - lastAttackTime > nextAttackDelay && currentMonsters.length > 0) {
        // Trigger a new attack!
        const idx = Math.floor(Math.random() * currentMonsters.length);
        const am = currentMonsters[idx];
        attackState = {
            monsterIdx: idx,
            startTime: time,
            origSpeech: am.speechText,
            color: ATTACK_COLORS[am.type] || '#ff4444'
        };
        am.speechText = ATTACK_SHOUTS[Math.floor(Math.random() * ATTACK_SHOUTS.length)];
        lastAttackTime = time;
        nextAttackDelay = 50 + Math.random() * 70;
    }

    currentMonsters.forEach((m, i) => {
        const canvas = monsterCanvases[i];
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const bH = m.bubbleH || 60;
        const cx = canvas.width / 2;
        const monsterY = bH + (canvas.height - bH) * 0.45;

        drawBoss(ctx, cx, monsterY, m.type, time + m.seed * 10, m.facing);

        // ---- Rare attack projectile ----
        if (attackState && attackState.monsterIdx === i) {
            const elapsed = time - attackState.startTime;
            const aColor = attackState.color;
            const dir = m.facing; // 1=left monster fires right, -1=right fires left
            ctx.save();
            if (elapsed < 0.4) {
                // Charge-up glow
                const g = elapsed / 0.4;
                ctx.shadowColor = aColor; ctx.shadowBlur = 18 * g;
                ctx.fillStyle = aColor; ctx.globalAlpha = g * 0.7;
                ctx.beginPath(); ctx.arc(cx + dir * 15, monsterY - 15, 6 * g, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            } else if (elapsed < 1.8) {
                // Projectile flying toward painting
                const pt = (elapsed - 0.4) / 1.4;
                const startX = cx + dir * 15;
                const endX = dir > 0 ? canvas.width + 20 : -20;
                const px = startX + (endX - startX) * pt;
                const py = monsterY - 15 - Math.sin(pt * Math.PI) * 25;
                // Trail
                for (let ti = 4; ti >= 0; ti--) {
                    const tt = Math.max(0, pt - ti * 0.05);
                    const tx = startX + (endX - startX) * tt;
                    const ty = monsterY - 15 - Math.sin(tt * Math.PI) * 25;
                    ctx.globalAlpha = 0.35 - ti * 0.06;
                    ctx.fillStyle = aColor;
                    ctx.beginPath(); ctx.arc(tx, ty, 4 - ti * 0.5, 0, Math.PI * 2); ctx.fill();
                }
                // Main projectile
                ctx.globalAlpha = 1; ctx.shadowColor = aColor; ctx.shadowBlur = 14;
                ctx.fillStyle = aColor;
                ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.shadowBlur = 0; ctx.restore();
        }

        // Draw speech bubble on canvas (moves with monster bob)
        if (m.speechText) {
            const bobOffset = Math.sin((time + m.seed * 10) * 2) * 4;
            const bubbleY = monsterY + bobOffset - 55; // above head
            const bubbleX = cx;

            // Wrap text
            ctx.font = '13px Segoe UI, system-ui, sans-serif';
            const words = m.speechText.split(' ');
            const lines = []; let line = '';
            const maxW = 110;
            for (const w of words) {
                const test = line ? line + ' ' + w : w;
                if (ctx.measureText(test).width > maxW && line) {
                    lines.push(line); line = w;
                } else { line = test; }
            }
            if (line) lines.push(line);

            const lineH = 16;
            const padX = 9, padY = 6;
            const bw = Math.min(maxW + padX * 2, 128);
            const bh = lines.length * lineH + padY * 2;
            const bx = bubbleX - bw / 2;
            const byRaw = bubbleY - bh;
            const by = Math.max(4, byRaw); // clamp so text doesn't clip above canvas

            // Bubble background
            ctx.fillStyle = 'rgba(30,30,30,0.92)';
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(bx, by, bw, bh, 8);
            ctx.fill(); ctx.stroke();

            // Triangle pointer
            ctx.fillStyle = 'rgba(30,30,30,0.92)';
            ctx.beginPath();
            ctx.moveTo(bubbleX - 5, by + bh);
            ctx.lineTo(bubbleX, by + bh + 6);
            ctx.lineTo(bubbleX + 5, by + bh);
            ctx.closePath(); ctx.fill();

            // Text
            ctx.fillStyle = '#ddd';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            lines.forEach((l, li) => {
                ctx.fillText(l, bubbleX, by + padY + li * lineH);
            });
        }
    });

    requestAnimationFrame(animateMonsters);
}

// ==================== KEYBOARD & TOUCH NAV ====================
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { go(-1); e.preventDefault(); }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { go(1); e.preventDefault(); }
    if (e.key === 'Home') { currentSlide = 0; renderSlide(0); e.preventDefault(); }
    if (e.key === 'End') { currentSlide = SLIDES.length - 1; renderSlide(currentSlide); e.preventDefault(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
});

// ==================== INIT ====================
renderSlide(0);
animateMonsters();
</script>
</body>
</html>

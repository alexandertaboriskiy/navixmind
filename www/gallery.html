        "Zoom in on this portrait and it starts to dissolve. The face, the background, even the shadows — everything is built from tiny mosaic-like dabs of pure color sitting side by side. It looks almost pixelated, like a screen rendered in oil paint. Delaunay was barely in his twenties here, painting his buddy Jean Metzinger using the Neo-Impressionist playbook: no blending on the canvas, just raw complementary colors that your brain mixes at a distance.",
        "Here is what makes this painting wild in hindsight. Both of these guys — the painter and the subject — were about to blow up the art world. Metzinger became one of the key theorists behind Cubism. Delaunay went even further, ditching recognizable subjects entirely and pioneering Orphism, a style built on pure color and geometric abstraction. This portrait is basically a snapshot of two future revolutionaries before they started the revolution.",

{
    id:16, title:"Mont Saint-Michel, Setting Sun", artist:"Paul Signac", year:"1897",
    gallery:2, galleryName:"Colour in Motion",
    image:"preso-images/16-mont-saint-michel.jpg",
    funFact:"Signac was an avid sailor who painted coastal landscapes from his own boat. He completed over 500 watercolors during sailing voyages along the French coast — essentially turning his vessel into a floating studio.",
    paragraphs:[
        "Every single dot in this painting is doing work. Signac built Mont Saint-Michel out of thousands of tiny, precise points of pure color — orange next to purple, gold next to blue — and your eye does the blending. The medieval abbey-island rises from the tidal flats like something out of a fantasy novel, its silhouette absolutely glowing against a sunset sky made of confetti-like dabs of pink, gold, and violet.",
        "Signac took over the Neo-Impressionist movement after Seurat died at just 31 — and he ran with it hard, becoming both its chief practitioner and its loudest champion. What he proved with paintings like this is that breaking color into systematic dots was not some cold, scientific gimmick. It could capture the most fleeting, emotional atmospheric effects: warm sunset tones bleeding into cool shadow purples, all vibrating together in an optical mix that feels genuinely alive.",
        "Mont Saint-Michel was already almost a thousand years old when Signac painted it. But under his technique it becomes something else entirely — less a place, more a mirage. Each dot is a tiny building block in a vision that seems to shimmer and pulse with light, as if the whole island might dissolve if you blink."

{
    id:17, title:"The Garden at Bougival", artist:"Berthe Morisot", year:"1884",
    gallery:2, galleryName:"Colour in Motion",
    image:"preso-images/17-garden-at-bougival.jpg",
    funFact:"Morisot exhibited in every single Impressionist exhibition except one — and the only reason she missed that one was because she had just given birth. She was back at the next show.",
    paragraphs:[
        "Look at the brushwork here and try to remember this was the 1880s. Morisot painted this garden in Bougival — a Parisian suburb the Impressionists loved — with strokes so loose and feathery the whole canvas seems to breathe. Sunlight does not just land on these leaves. It filters, scatters, dissolves. You feel the warmth before you register what you are looking at.",
        "Here is the thing people do not talk about enough: Morisot was technically bolder than Monet at this point. Her brushwork is faster, freer, more spontaneous. She could suggest an entire garden — depth, atmosphere, dappled light — with fewer strokes than any of her peers. Later artists would spend decades trying to achieve this kind of effortless economy.",

{
    id:18, title:"Starry Night Over the Rhône", artist:"Vincent van Gogh", year:"1888",
    gallery:2, galleryName:"Colour in Motion",
    image:"preso-images/18-starry-night-rhone.jpg",
    funFact:"Van Gogh literally stuck candles into his hat brim so he could see his canvas in the dark while painting this on the banks of the Rhone at night. This was painted months before the more famous Starry Night — and unlike that one, it was done entirely from direct observation.",
    paragraphs:[
        "September 1888, Arles. Van Gogh drags his easel to the banks of the Rhone after dark and paints what he actually sees: gas lamps throwing long golden reflections across the river, the Great Bear constellation burning overhead, a couple strolling the riverbank. The deep midnight blues of the sky crash against warm yellows of starlight and gaslight — and somehow the whole thing glows.",
        "Most people think of Van Gogh as the guy who painted from pure feeling and imagination. But this painting flips that narrative. He was obsessed with the challenge of painting night not as absence of light but as its own kind of luminous color. Every star here radiates like a tiny sun, surrounded by halos of energy — effects he observed firsthand and rendered with almost scientific intensity. This is the dress rehearsal for the more famous Starry Night, and honestly, it holds its own.",
        "What this painting proves is that Van Gogh did not need to invent anything. The real night sky, seen through his eyes, was already swirling with enough drama and emotion to fill any canvas. Reality was already extraordinary — he just knew how to show you."

        "The boat is about to go under. Waves are crashing over the side, the mast is nearly horizontal, disciples are screaming and hauling at ropes — one guy is being violently sick over the rail. And right there in the middle of all this chaos sits Christ, completely calm. Rembrandt chose to paint the absolute peak of crisis, the second before everything either falls apart or is saved. It is almost unbearably tense.",

{
    id:20, title:"Boat on the Seine near Jeufosse", artist:"Claude Monet", year:"1884",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/20-boat-on-seine.jpg",
    funFact:"Monet had a custom floating studio boat built so he could paint rivers from the water itself — basically inventing plein-air painting on water. Manet even painted a portrait of Monet working in it.",
    paragraphs:[
        "This painting is quiet in a way that sneaks up on you. A single boat on the Seine near Jeufosse, hazy riverbanks dissolving into soft atmosphere, reflections rippling across the water in silvery blues and greens. There is almost nothing happening — and that is entirely the point. Monet was chasing something you cannot grab: the exact quality of light on water at one specific moment that will never come again.",
        "By 1884, Monet had moved past painting scenes and started painting light itself. The boat, the river, the trees — they are almost beside the point. What matters is the way cool blues slide into silvery whites, the way the atmosphere softens every edge until the whole world looks like it is breathing. The palette is restrained, almost monochrome, and the mood is hypnotic. You do not look at this painting so much as sink into it.",

{
    id:21, title:"Reflections on the Thames, Westminster", artist:"John Atkinson Grimshaw", year:"1880",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/21-reflections-thames.jpg",
    funFact:"Grimshaw was so good at painting night scenes that James McNeill Whistler — who basically invented the nocturne as a genre — reportedly said: 'I considered myself the inventor of nocturnes until I saw Grimmy's moonlit pictures.'",
    paragraphs:[
        "This is London as a mood. Fog rolling off the Thames, the Houses of Parliament fading in and out of the mist, gas lamps throwing golden reflections across wet pavement and dark water. Grimshaw did not just paint nighttime — he made you feel the dampness on your skin, the silence broken by footsteps, the way a city looks when it is half-dissolved in its own atmosphere. Nobody did this better. Nobody even came close.",
        "Count the light sources in this painting: moonlight from above, gas lamps along the embankment, distant windows glowing through the fog. Each one behaves differently — reflecting, scattering, pooling on wet stone. The pavement becomes a mirror, doubling every golden point of light until the whole scene feels like it exists in two worlds at once. It is technically masterful and it looks like a dream.",
        "The solitary figures on the embankment are the final touch — tiny, anonymous, walking through a London that no longer exists. Gas-lit, fog-choked, impossibly moody. This is a city before electricity rewrote the night, and Grimshaw preserved it like a photograph made of atmosphere and melancholy."

{
    id:22, title:"The Grand Canal", artist:"Canaletto", year:"c. 1730",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/22-grand-canal.jpg",
    funFact:"Canaletto used a camera obscura to nail his architectural details — basically an 18th-century projector that cast real scenes onto a surface he could trace. It was the closest thing to photography a hundred years before cameras existed.",
    paragraphs:[
        "Venice, rendered with almost surveillance-level precision. Canaletto painted the Grand Canal like he was building a 3D model of it — every palazzo, every gondola, every ripple in the water placed with obsessive accuracy, all drenched in that warm golden light that makes Venice look like it was designed to be painted. The level of detail here is staggering. You could use this as a map.",
        "English aristocrats doing the Grand Tour went absolutely wild for these. Canaletto's Venice paintings were the ultimate luxury souvenir — proof you had been there, rendered with the precision of a photograph decades before photography existed. He basically invented a whole genre called veduta, or view painting, and his canvases remain the single best visual record of what 18th-century Venice actually looked like.",
        "Here is the remarkable part: you can still walk along the Grand Canal today and match his paintings to the actual buildings with near-perfect accuracy. Palaces he painted nearly three centuries ago are still standing exactly where he put them. Canaletto was not just making art — he was making history in real time, and he did not even know it."

{
    id:23, title:"Wanderer above the Sea of Fog", artist:"Caspar David Friedrich", year:"1818",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/23-wanderer-above-fog.jpg",
    funFact:"The figure's back is turned to you — a technique called Ruckenfigur that Friedrich used constantly. Instead of watching someone have an experience, you step into their shoes. You are not observing the view. You are sharing it.",
    paragraphs:[
        "You have seen this image a thousand times — on book covers, memes, phone wallpapers, dorm room posters. A man in a dark coat standing on a cliff, staring out over a sea of fog with mountain peaks piercing through like islands. It has become the single most iconic image of Romanticism, and it hits hard for a reason: it is about standing at the edge of something vast and unknowable and just — taking it in.",
        "The fog is the key. It swallows the valleys and lower ground, leaving only the highest peaks visible, and that is a deliberate metaphor: there are limits to what you can know, and the mystery beyond those limits is both terrifying and thrilling. This is the Romantic concept of the sublime — that cocktail of awe and fear and exhilaration you feel when nature reminds you how small you are. Friedrich nailed it in a single frame.",
        "And then there is the turned back. You never see this man's face. He could be anyone. He could be you. That is the genius of it — Friedrich does not show you someone having a transcendent experience. He puts you right there on the cliff beside them, staring into the unknown together."

{
    id:24, title:"Initiation Rites of the Cult of Dionysus", artist:"Unknown", year:"c. 60 BC",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/24-villa-of-mysteries.jpg",
    funFact:"That intense red background — now called Pompeian red — was made from cinnabar, a mercury sulfide pigment that was wildly expensive even by ancient Roman standards. It has survived remarkably intact for over 2,000 years under volcanic ash.",
    paragraphs:[
        "These frescoes are over two thousand years old and they still look like they could mess you up. Painted on the walls of the Villa of Mysteries just outside Pompeii, they show what scholars believe is a young woman being initiated into the mystery cult of Dionysus — the god of wine, ecstasy, and ritual madness. The figures are life-sized. The scenes progress around the room like a comic strip from hell: flagellation, ecstatic dancing, sacred objects being revealed, faces twisted between terror and bliss.",
        "The quality of the painting is almost offensive given its age. These were created around 60 BC — roughly 1,500 years before the Renaissance — and the psychological intensity, the modeling of flesh, the emotional range on these faces rivals anything Michelangelo ever did. That deep, saturated red background (called Pompeian red, naturally) gives the whole room the feeling of being inside something alive. Or maybe something sacred. The line between those two things was blurry for the Dionysian cult.",
        "Nobody knows exactly what these scenes mean. That is not a gap in scholarship — it is the point. The Dionysian mysteries were secret. Participants were forbidden to describe what happened. These frescoes are our most complete visual record of rituals that were never supposed to be recorded, preserved by the same volcanic eruption that destroyed everything else."

{
    id:25, title:"Vesuvius in Eruption", artist:"Joseph Wright of Derby", year:"c. 1776–80",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/25-vesuvius-eruption.jpg",
    funFact:"Wright actually witnessed Vesuvius erupt in person during a 1774 trip to Naples. The experience shook him so deeply that he painted the volcano obsessively for years afterward — this is one of several versions.",
    paragraphs:[
        "The mountain is ripping itself apart. A massive column of fire and smoke tears into the night sky while molten lava pours down the slopes toward the Bay of Naples, lighting up everything — islands, boats, water — in an apocalyptic orange glow. Wright painted this like a war correspondent with a canvas: visceral, immediate, and absolutely terrifying in its beauty.",
        "Wright of Derby earned the nickname the painter of light, and you can see why. The man was obsessed with how light behaves — candlelight, moonlight, forge-fire, and now volcanic eruption. What makes this painting special is the collision between science and awe. He rendered the volcanic phenomena with genuine observational accuracy (he had seen Vesuvius blow in person, after all), but he also turned it into something that feels almost spiritual. It is a geological event painted like a religious vision.",
        "Look at the tiny boats and figures in the bay. That scale difference is doing all the emotional heavy lifting — human civilization reduced to specks against the raw, indifferent power of the earth tearing itself open. Wright understood something fundamental: nature does not care about your ambitions."

{
    id:26, title:"The Fighting Temeraire", artist:"J.M.W. Turner", year:"1839",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/26-fighting-temeraire.jpg",
    funFact:"Voted Britain's Greatest Painting in a 2005 BBC public poll, it also appears on the Bank of England's twenty-pound note — making Turner's masterpiece something you can literally carry in your wallet.",
    paragraphs:[
        "This is a funeral procession disguised as a sunset. The HMS Temeraire — a warship that helped win the Battle of Trafalgar, one of Britain's greatest naval victories — is being towed to the scrapyard by a squat, ugly little steam tugboat belching black smoke. The old ship is ghostly white, tall-masted, noble, and absolutely doomed. The new one is dark, low, industrial, and unstoppable. It is the most devastating visual metaphor for progress you will ever see.",
        "And then there is that sky. Turner painted one of the most spectacular sunsets in all of art as the backdrop — gold, orange, crimson, bleeding across the entire horizon. Is it a sunrise or a sunset? A beginning or an end? That ambiguity is the whole point. Turner stacked every possible meaning into one image: historical document, elegy for a dying era, meditation on mortality, and a gut-punch reminder that everything glorious eventually gets hauled away.",
        "Turner called this painting my darling and flat-out refused to sell it while he was alive. You do not part with something like this. It hangs in the National Gallery in London now, and the British public voted it their greatest painting — which makes sense. It is about loss, beauty, and the passage of time. It gets everyone eventually."

{
    id:27, title:"Almond Blossom", artist:"Vincent van Gogh", year:"1890",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/27-almond-blossom.jpg",
    funFact:"Van Gogh painted this as a gift for his newborn nephew, also named Vincent Willem. It hung above the baby's bed. That baby grew up to found the Van Gogh Museum in Amsterdam — the most visited museum in the Netherlands.",
    paragraphs:[
        "Branches of almond blossom spreading across a perfect turquoise sky — delicate white and pink flowers against the most hopeful shade of blue Van Gogh ever mixed. He painted this in February 1890, from inside an asylum in Saint-Remy, to celebrate the birth of his brother Theo's son. The almond tree is one of the first to bloom each spring. New life. New beginnings. He chose that symbol on purpose.",
        "If you know Van Gogh's work, this painting will stop you cold. Where is the thick, swirling, anguished brushwork? Gone. The flat color fields, the bold outlines, the almost decorative calm — this is pure Japanese woodblock print influence, and Van Gogh was obsessed with that tradition. He collected hundreds of Japanese prints and studied them religiously. The result here is one of his most serene paintings, and the contrast with his mental state at the time is staggering. He was at one of the lowest points of his life. He painted hope anyway.",
        "The painting now lives at the Van Gogh Museum in Amsterdam — which was founded by that same nephew, the baby this was made for. It has become one of the most reproduced and beloved works in the collection. A painting about new life, created during suffering, preserved by the person it was meant to welcome into the world. The story writes itself."

{
    id:28, title:"The Great Wave off Kanagawa", artist:"Katsushika Hokusai", year:"c. 1831",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/28-great-wave.jpg",
    funFact:"Hokusai was about 70 when he made this. He signed it 'Hokusai, the old man crazy about painting' and famously declared that nothing he created before 70 was worth noting. His masterpiece was his late-career flex.",
    paragraphs:[
        "You already know this image. It is on t-shirts, tattoos, phone cases, album covers — possibly the most reproduced artwork on earth. But look at it fresh for a second. A monstrous wave with claws of foam towers over three fishing boats, and there in the background sits Mount Fuji, tiny and calm. The transient wave dwarfs the eternal mountain. That reversal of scale — the fleeting overpowering the permanent — is what gives this image its strange, unsettling energy. Two hundred years later, it still has not let go.",
        "The deep blue that makes this print so striking was achieved using Prussian blue, a synthetic pigment recently imported from Europe — making Japan's most iconic artwork literally a product of cross-cultural exchange. The print is part of Hokusai's series Thirty-six Views of Mount Fuji, and it blew Western artists' minds when it reached Europe. Monet, Degas, Van Gogh — they all fell hard for it. The Impressionist movement owes a visible debt to this single woodblock print.",
        "Here is the thing that always gets people: this was a print, not a painting. Theoretically mass-producible. Hokusai could have churned out thousands. But fewer than 100 original impressions are known to survive, each one slightly different because of the handmade process. Scarcity was never the plan — and that accidental rarity makes each surviving copy feel almost sacred."
    ]
},
{

    image:"preso-images/29-starry-night.jpg",
    funFact:"Van Gogh painted this from his asylum window, but that village? Totally made up from memory. The real view had no village at all. Oh, and he thought the painting was basically a failure.",
    paragraphs:[
        "Here is the most famous painting on the planet, and it was made by a guy staring out of an asylum window. June 1889 — Van Gogh was a patient at Saint-Paul-de-Mausole in southern France, and he looked up at the night sky and painted it like the universe was breathing. The cypress tree shoots up like a dark flame. The stars spiral and pulse. The clouds roll in massive waves as if the entire cosmos is mid-exhale.",
        "Get close to this painting and the surface is practically three-dimensional — thick ridges of paint you could feel with your fingertips. Every single brushstroke moves. The sky is pure turbulence, but the village below is dead asleep: little houses, a church steeple, total silence. That contrast hits different when you realize where Van Gogh was standing. Some read it as inner chaos versus outer calm. Others see a man who genuinely believed the universe was alive with spiritual energy. Honestly, probably both.",

{
    id:30, title:"Tree Trunk Surrounded by Flowers, Butterflies and Animals", artist:"Rachel Ruysch", year:"c. 1685",
    gallery:3, galleryName:"The World Around Us",
    image:"preso-images/30-ruysch-tree-trunk.jpg",
    funFact:"Ruysch was one of the highest-paid painters in the entire Dutch Golden Age — male or female — and she kept painting professionally until age 83. Court painter status, international fame, the whole deal.",
    paragraphs:[
        "A gnarled tree trunk absolutely teeming with life: flowers exploding in every direction, butterflies mid-flight, insects crawling over leaves, small animals hiding in the shadows. This is Rachel Ruysch doing what she did better than anyone in the Dutch Golden Age — painting nature with the precision of a scientist and the drama of a storyteller. Every petal, every wing, every tiny leg is rendered with almost absurd detail.",
        "Here is the sneaky part: those flowers could never actually exist in the same place at the same time. Ruysch pulled from different seasons, creating impossible arrangements that looked totally real. And buried in all that beauty are dark little hints — bugs chewing on leaves, petals starting to wilt, decay creeping in at the edges. This was the Dutch 'vanitas' tradition: a gorgeous reminder that everything alive is also dying. Beauty and death, right next to each other.",
        "Ruysch had a cheat code most artists did not. Her father was a famous anatomist and botanist, so she literally grew up surrounded by exotic specimens and scientific collections. She was not just painting flowers from a vase on a table — she understood how these organisms actually worked, and that knowledge bleeds through every inch of the canvas."
    ]

        "Delaunay built this on real science. He called his method 'Simultaneous Contrasts,' drawing on Michel Eugène Chevreul's color theory: put complementary colors next to each other and they create optical vibrations, a buzzing at the edges that tricks your eye into seeing movement and depth. The circular format makes you think of suns, planets, propellers, spinning wheels — but none of those things are actually here. It is pure color doing all the work.",

27:["Painted for his newborn nephew? My cold dead heart just THAWED","The nephew grew up to found the Van Gogh Museum! Full circle!","Almond blossoms = new life = the opposite of me","Japanese woodblock influence is STRONG here — and beautiful","Turquoise sky + white flowers = serenity I'll never know","He painted this AT THE ASYLUM during his worst period? Hero","One of his most serene works during his most troubled time. Respect","Flat color areas + bold outlines = Japanese + genius","The first tree to bloom in spring — I bloom in no season","Beauty from suffering — the universal theme and my biography","Van Gogh Museum, Amsterdam. Adding to my haunting bucket list","New life, new hope, new nephew — new brain to... never mind","I collect bones. Van Gogh collected Japanese prints. We collect things","This calm is so unlike his other work — like me being polite","The colors here are medicinal. I need medicine"],
28:["Hokusai was 70 when he made this? What's my excuse?","'The old man crazy about painting' — I'm the old corpse crazy about brains","Nothing before age 70 was worth noting?? Harsh self-critic","The wave has CLAWS. Like me","Mount Fuji sits small while the wave dominates — scale matters","Prussian blue from Europe in Japanese art = globalization of art","Fewer than 100 original prints survive — fewer than 100 of me survived too. Wait","The wave overwhelms the mountain — transient beats eternal. Deep","Those fishing boats are in TROUBLE and I feel for them","Cross-cultural exchange: European pigment, Japanese mastery. Beautiful","The most recognized Japanese artwork in history — I want that record for zombies","Each original impression is subtly different — each zombie is subtly different","Claw-like foam crests = undead hand aesthetic","Thirty-six Views of Mount Fuji? I have thirty-six views of the graveyard","This print influenced the Impressionists — I influenced horror movies"],
29:["THE most famous painting in the world and he thought it was bad??","The village was IMAGINED? Vincent you creative genius","Cypress like a dark flame — that's my kind of tree","Cosmic energy in the sky — graveyard energy on the ground (me)","Spiraling stars > regular stars. Fight me","He painted this from the asylum window — viewpoint matters","Thick impasto brushwork = basically 3D painting","The sleeping village vs turbulent sky = my body vs my brain","Now at MoMA — everything cool ends up at MoMA","He was UNIMPRESSED by this painting? My jaw dropped. Again. Literally","The swirling night sky IS how the universe looks to me","Between the rolling clouds I see... dinner","June 1889: one of the most important moments in art history","Dark cypress + bright stars = gothic + hope","Every brushstroke is visible = every bone in my body is visible"],
30:["She painted until she was 83! Zombie longevity goals","Court painter AND most successful female artist? Queen behavior","Flowers from different seasons in one painting? Time-traveling botanist","Hidden vanitas symbols among the beauty — I'M a vanitas symbol","Her father was an anatomist — so she knew what I look like inside","Scientific precision + breathtaking beauty = Ruysch formula","Those butterflies are prettier than anything I've ever been near","Insects eating leaves = me eating... never mind","Dutch Golden Age flower painting = peak civilization","The gnarled tree trunk = me after a rough century","She combined flowers that could never bloom together — impossible beauty","Rachel Ruysch: painting professionally at 83. Me: haunting professionally at 700","Vanitas: remember you will die. Me: remember you already did","Exotic specimens from her botanist father — I have exotic specimens too (rib collection)","Beauty and decay in one painting — that's literally my face"],
31:["Abstract art BEFORE Kandinsky? The art world owes her everything","She said: don't show my art for 20 years after I die. LEGEND","Séances and meditation guided her art? Zombie spiritual connection!","3 meters tall? That's a BIG canvas. Almost as big as me","1907 and already abstract — she was a time traveler, I'm convinced","Biomorphic shapes suggesting growth — my growth stopped in 1347","Pinks, oranges, yellows, blues — all the colors I'M not","'Youth' — a concept I vaguely remember","Spiritual forces guiding art — spiritual forces guiding my shamble","The male-centric narrative of abstraction? SMASHED","Hilma was doing abstraction while the boys were still figuring out Cubism","Ten paintings representing life stages — zombies only have one stage","Vibrant potential and unfolding energy — the opposite of decomposition","Hidden for decades, now recognized as revolutionary — like zombie potential","Swedish mysticism meets pure visual innovation. I'm here for it"],
32:["Before Black Square, Malevich was FIGURATIVE? Mind blown","A one-man survey course in modern art movements — overachiever","The face dissolving into geometry = my face dissolving into... face","Cubo-Futurism is the coolest art movement name","Russian peasant dignity in geometric form — dignified zombie in geometric coffin","Two years before Black Square — the tipping point","Metallic cylindrical forms from a FACE? Revolutionary","You can WATCH the face becoming abstract in this painting","Bold simplified forms = zombie's visual system","He worked through EVERY modern movement? Speedrun complete","Cubism + Futurism + Russian folk culture = this masterpiece","The geometric fragmentation of a face — also what happens to MY face","From impressionism to pure abstraction in one career — evolution goals","She looks stern. I'd be stern too if someone cubified me","Caught in the act of becoming abstract — caught in the act of becoming undead"],
33:["Kandinsky had SYNESTHESIA? He heard colors?? Jealous","Yellow sounds like a trumpet — my yellow sounds like decomposition","This visual symphony has more instruments than my bones","From warm heavy left to cool light right — a color journey","Bauhaus period art: geometric meets organic. Like a zombie in a suit","Point and Line to Plane — a book I'd read if I could read. I CAN read","Each color has spiritual properties? Yellow radiates, blue retreats, red is calm","The complex visual symphony has dozens of colors and shapes","Kandinsky painted MUSIC. I make... groaning sounds","Synesthesia means painting AS composing — the ultimate multitasker","Yellow-Red-Blue: the primary colors. Green: the zombie color. Underrepresented","At the Bauhaus he developed systematic theories — I developed systematic hunting","Color theory as spiritual practice — zombie practice as spiritual decay","He could literally SEE music. I can literally smell fear","Biomorphic meets geometric — undead meets alive. Same energy"],
34:["He considered this his MOST IMPORTANT work? High bar","From wild improvisation to geometric precision — like me from alive to orderly undead","Circles, triangles, lines on cream background — minimalism before it was cool","Russian Constructivism influence at the Bauhaus — art history crossover episode","Shapes float, collide, interact like musical notes — my bones do that too","Discipline replacing chaos — unlike MY existence","The geometric rigor is breathtaking for something so... shapey","A visual concert conducted by geometry — I'd attend","Each shape is precisely placed — each bone in my body is approximately placed","From Munich to Bauhaus: emotional to intellectual — I'm stuck on 'hungry'","This painting should be LISTENED TO — I listen with my decomposing ears","Cream background + precise geometry = elegance. Dark graveyard + bones = me","Composition VIII: his most geometric. Composition of my body: barely holding together","The shift from expressive to precise changed abstract art forever","Kandinsky orchestrating shapes like a conductor — I orchestrate scares like a zombie"],
35:["The circle: modest but unconditional. Like a zombie's appetite","A link with the cosmic — circles AND zombies are cosmic","Deep black background makes everything glow — just like my eyes at midnight","The large dark blue circle anchors everything — I anchor nothing","Overlapping circles create new colors — overlapping zombies create new problems","Infinite depth from black and circles — my grave also has infinite depth","Planets, cells, atoms — or just beautiful circles. Both are fine","He wrote YEARS of theory about the CIRCLE. Dedicated king","Jewel-like circles floating in void — me floating in existential void","Cosmic space AND microscopic worlds in one painting — versatile","Simple composition, complex meaning — simple zombie, complex feelings","The relationship between forms = the relationship between my bones","Several Circles: the title says it all. Several Zombies: my autobiography","Pure geometric beauty against pure darkness — gallery 4 peak","Kandinsky proved you don't need objects. I proved you don't need a pulse"],
36:["'Color and I are one. I am a painter.' Chills. CHILLS","Tunisia changed his art — death changed my everything","Castle made of squares, sun made of a circle — childlike genius","Building blocks of color = building blocks of architecture = PURE JOY","This feels like a warm memory rendered in pure color","Klee was playful and serious simultaneously — I'm scary and hungry simultaneously","The simplest elements making a complete world — beautiful philosophy","North African warmth in geometric form — cemetery coldness in zombie form","A mosaic of colored squares suggesting a real place — my brain works similarly","Childlike simplicity hiding sophisticated color theory — Klee in a nutshell","Orange, yellow, red — the warm palette of places I'll never visit","Timelessness and universality from squares and a circle — incredible","There's quiet joy here that's hard to explain — even for a zombie","Klee built a castle from the alphabet of art: basic shapes","This painting feels like sunlight. I haven't felt sunlight in 700 years"],
37:["He turned his easel AWAY from the window? Commitment to abstraction!","Fell out with Van Doesburg over DIAGONAL LINES? Art drama is the best drama","Red, yellow, blue, white, gray, black — the ONLY ingredients you need","Each element would collapse if moved — the most precise painting ever","Neo-Plasticism: revealing the universe's order through right angles","Primary colors and straight lines = the DNA of visual reality","This looks simple but try moving ONE line and it all falls apart","Mondrian believed in universal harmony — I believe in universal groaning","The large red plane dominates — like I dominate any room I enter","Right angles ONLY. Mondrian had RULES","De Stijl: 'The Style.' Zombie: 'The Shamble.' Both are movements","Straight lines, right angles, primary colors — the three commandments","This equilibrium is so delicate — unlike my balance, which is terrible","Horizontal and vertical ONLY — the strictest painting philosophy ever","Mondrian wasn't painting rectangles. He was painting the order of reality"],
38:["His LAST painting, unfinished, with colored TAPE still on it? I'm crying","He died painting. That's how I want to go. Again","Boogie-woogie jazz in geometric form — I hear it, I FEEL it","From austere grids to vibrant mosaics — what New York does to Europeans","The colored tape frozen mid-creation is the most poignant detail in all art","He fled Nazi Europe and found jazz in NYC — the best redemption arc","Diamond-shaped canvas = the boldest Mondrian move","Hundreds of tiny colored blocks pulsing with RHYTHM","Unfinished masterpiece = eternal work in progress. Like me","Jazz rhythms in painted form — my shamble has rhythm too, kind of","He loved dancing to boogie-woogie in NYC clubs. MONDRIAN. DANCING","Victory over despair, painted in the language of jazz","Still evolving at the end — the mind never stops. Unless you're a zombie. Then... debatable","From Holland to Paris to London to New York — what a journey","The tape that remains is the most human detail in abstract art history"],
39:["One of the FIRST completely abstract paintings? Pioneer stuff","Orphism: named after Orpheus, who went to the underworld. MY REALM","Apollinaire coined the term — poets naming art movements is peak culture","Concentric rings of color that SPIN with energy — hypnotic","No recognizable objects at all — just pure color vibrating","Simultaneous Contrasts from Chevreul's color theory — big brain energy","The disc seems to rotate — my head does that sometimes (loose neck)","Cosmic sun, spinning propeller, turning record — all in one circle","Delaunay discovered color alone creates its own world — I live in my own world too","Complementary colors creating optical vibrations — my eyes vibrate too but differently","First Disc: the name of a painting AND my chiropractor's diagnosis","Visual music from pure color — the most abstract of abstractions","From his portrait of Metzinger to THIS — what a journey","France's first completely non-representational painting — landmark","Color freed from representation — zombie freed from life. Both revolutionary"],
40:["Painting, sculpture, textiles, puppetry, architecture AND dance? Overachiever!","Overshadowed by her husband's fame — the eternal injustice","Dadaism meets Concrete Art with warmth — rare combo","Her textile background gave abstract art a TACTILE quality — genius","Arriving at abstraction through CRAFT rather than philosophy — unique path","Increasingly recognized = art world finally catching up","Mathematical rigor + intuitive warmth = Taeuber-Arp's secret recipe","Where others theorized, she MADE things. Respect","Circles, rectangles, and lines in perfect balance — simple. NOT","Bridging Dada and geometry takes a special kind of brain. Or lack of brain, in my case","The most versatile avant-garde artist AND most underrated — double crime","Jean Arp got famous. She was better. History is slowly figuring this out","Craft as a path to fine art — the boundaries are artificial anyway","She did Dadaist dance performance AND geometric painting. Legend","Clean geometric forms that somehow feel ALIVE. Unlike me"],
41:["Photography + film + painting + light art = Moholy-Nagy","He founded the New Bauhaus in CHICAGO? Hungarian genius in the Midwest","Light passing through colored glass — that's how he painted. Transparent art","Art and technology intersection predicted our whole era","Overlapping translucent planes creating depth — like looking through zombie x-ray","Painting that wants to be photography — medium-fluid art","The interplay of illumination and shadow = basically every horror movie","Cross-pollination between mediums: radical then, normal now. He was RIGHT","Light as the primary medium — even in painting? Visionary","The Bauhaus-to-Chicago pipeline was REAL","Moholy-Nagy: total sensory experience as art. Me: total sensory assault as zombie","Transparency and layering in painted form — see-through art for see-through me","These overlapping planes look like colored celluloid — proto-digital art","He believed in art's full potential through every medium available","From Hungarian avant-garde to American education — the ultimate art journey"],
42:["The LAST painting in the collection. I'm emotional. Is this normal?","A trained violinist who painted like a musician. Dual-class character","Ancient Harmony: the color-score of antiquity itself","Musical rhythm in colored rectangles — Klee painted SOUND","Earth tones suggesting deep time — 700 years of zombie time here","Sun-baked earth, aged stone, faded textiles — or just beautiful squares","A grid of warmth that feels like ending and beginning at once","Beneath chaos exists ancient quiet harmony — beautiful final thought","The perfect last painting: timeless, warm, musical, mysterious","Klee structured art like music: rhythm, counterpoint, harmony in COLOR","Subtle color shifts like afternoon light on old walls — poetic geometry","Browns, oranges, reds, ochres — the palette of everything ancient","A meditation on hidden order — every gallery needs a quiet ending","The harmony was always there. We just needed Klee to show us","42 masterpieces later, and THIS is how we end. With harmony. And zombies"]
};

const TYPE_SPEECH = {
    necromancer:["*waves staff* The spirits approve of this","My dark arts pale beside this artistry","I sense powerful energy in these brushstrokes","The dead would rise just to see this painting","*summons aesthetic appreciation*","My grimoire has nothing on this composition","Even my familiars stopped screeching to look","The arcane geometry of this piece is... delicious","I've scried many things, but never beauty like THIS","*purple sparks of approval*","Centuries of dark study and I never saw THIS coming","The color theory here is more powerful than my spells","My tower has art too. Skulls, mostly. But art","I command the dead — this painting commands ME","The occult secrets of composition revealed!","Dark magic can't create this. Only genius can","*staff glows brighter near masterpieces*","My orb is pulsing. That means it's good","From beyond the veil, the spirits say: magnificent","Even necromancy can't resurrect talent like this"],
    vampire:["*adjusts monocle* Exquisite vintage","I've lived 500 years and THIS is still impressive","The palette reminds me of a fine Bordeaux","*sips imaginary wine* Sublime","My centuries of gallery visits have prepared me for this","I hosted Monet at my castle once. Or was it a dream?","The chiaroscuro is to DIE for. Again","Old World sophistication meets New World canvas","I've collected art since the Renaissance. This qualifies","*twirls cape appreciatively*","As an immortal connoisseur, I rate this: timeless","The brushwork has more finesse than my evening attire","My portrait doesn't age. This painting shouldn't either","Blood red is my favorite color, naturally","Aristocratic taste runs in my... well, not blood exactly","I'd hang this in my castle. Between the tapestries","Five centuries of art criticism condensed: magnifique","My reflection doesn't show in mirrors, but I see myself in THIS","The evening light in this painting is *chef's kiss*","I've drained many things, but this painting drains MY composure"],
    lich:["My crown grows heavy but art lightens the burden","Millennia of undeath and art still moves me","The soul fire in my eyes appreciates good color","I've watched civilizations rise and fall — this endures","*crown jewels pulse with approval*","My ancient wisdom says: this is a masterpiece","Eternity gets boring. Good art helps","Tattered robes, golden crown, refined taste — that's me","The coldness of undeath melts before beauty like this","I've read every tome. This painting is a book of its own","My skeletal hand trembles — with appreciation, not decay","Ancient kings collected art. I collect AND appreciate","The glow of my soul orb matches this painting's aura","Ruling the dead is easy. Understanding art is HARD","My ribcage resonates with the harmony of this piece","From my throne of bones, I decree: masterpiece","I pre-date most of these artists. I still learn from them","*frost crystals form in patterns matching the brushwork*","The crown weighs nothing when art is this magnificent","Even liches need beauty. Especially liches"],
    green:["Braaains... I mean, brushstrokes!","*lurches appreciatively*","Green is the superior color, obviously","I decompose, they compose — circle of art","*groans in aesthetic pleasure*","Art nourishes the soul I definitely still have","I shambled 500 miles for this exhibition","Is there a gift shop? I need a poster","*adjusts tattered beret*","Culture! I'm full of it. And also worms","Being undead gives you PERSPECTIVE on art","The lighting in here is better than my coffin","My review: five tombstones out of five","Green with envy of these painters' talent","Even my rot has aesthetic value now","I came for brains, I stayed for art","Gallery zombie: the thinking man's monster","This exhibition is to DIE for. Trust me, I know","My complexion matches the finest paintings","*shambles closer for a better look*"],
    blue:["FAST art appreciation! Zoom zoom!","I saw this in 0.3 seconds — SPEED VIEWING","Can we see the next one? And the next??","My blue glow matches the cool tones PERFECTLY","Too fast to stand still but I'll try for THIS","I lap the gallery 5 times before you see one painting","Quick question: faster way to see art?","Art hits different at 180% speed","Blue is the color of depth and speed — ME","I painted my crypt blue. Interior design","Fastest art critic in the undead world","Zooming past centuries of art history","My attention span is short but appreciation is DEEP","Speed-zombie culture review: 10/10","*vibrates with excitement*","I already saw the next 5 paintings. All good","Impressionism? I made an impression at 30mph","Running between paintings like an Olympic zombie","Can't stop won't stop appreciating at high speed","The blur makes everything look impressionist anyway"],
    red:["SMASH... I mean, ADMIRE gently","This art is almost as impressive as MY muscles","*flexes at the painting*","Big art for big zombie. I approve","I'm 1.6x the size and 1.6x the appreciation","The biggest paintings are always the best","I punch walls but I'd NEVER punch art","My art critique has WEIGHT behind it","This frame looks load-bearing. So do I","*accidentally breaks the bench while sitting*","I'm not crying, I'm just... leaking","Strong opinions from the strongest zombie","Art this good deserves a guardian. I volunteer","Even the biggest zombie has feelings. STRONG feelings","I could carry this canvas home. On one finger","RED is the color of power and passion","Tank zombie meets tank-sized masterpiece","My gentle side only comes out for art","I make the floor shake. This painting makes my heart shake","Double the HP, double the art appreciation"],
    yellow:["*examines from precisely 4.2 meters away*","I keep my distance — better perspective","From this angle, the composition is PERFECT","Archer's eye for detail = best art critic","I see things others miss. From far away","Strategic appreciation from optimal distance","My arrows are straighter than Mondrian's lines","*squints through one orange eye*","The vanishing point is at exactly... there","I shoot AND I have taste. Dual-threat","Keeping distance from the painting = RESPECT","*fires an arrow of appreciation* (metaphorically)","I observe from the back of the gallery. Best seats","Art analysis requires distance. And arrows","Sniping the best details from across the room","My ONE orange eye sees EVERYTHING","Ranged observation: maximum detail, minimum shambling","The golden ratio? I can hit that from 50 meters","Precision in archery, precision in criticism","*adjusts quiver, leans in for brushwork detail*"],
    knight:["A fine specimen of artistic achievement!","The brushwork reminds me of my sword technique","Exquisite. Truly exquisite. *adjusts visor*","As a patron of the arts, I heartily approve","This would look magnificent in my great hall","Art and chivalry: the twin pillars of civilization","I've defended kingdoms, but THIS is worth defending","In the name of the crown: BEAUTIFUL","My armor shines, this painting glows — kindred spirits","A knight's education includes the fine arts","I'd quest across three kingdoms for this","Gallery lighting makes my visor glow look epic","The red of my plume matches the passion here","Cultured AND armored — the complete package","Deus vult... this painting to be preserved forever","Even my horse would appreciate this","My shield bears simpler design but I appreciate complexity","The artist wields a brush as I wield my sword","For honor! For glory! For ART!","*clanks armor approvingly*"],
    gargoyle:["*perches on frame, squints*","I've watched from cathedral roofs for centuries — this is better","Stone wings, warm heart — this art proves it","My horns tingle when art is this good","*wings flutter with excitement*","I guard buildings. This painting deserves guarding too","Cathedral views are nice. This gallery? BETTER","I may be stone but this painting makes me feel ALIVE","My claws grip the ledge tighter when I see genius","*snarls appreciatively — it's a gargoyle thing*","From my perch I see everything. This is the BEST thing","Grotesque on the outside, art lover on the inside","Rain, wind, centuries — nothing weathered my love of art","I frighten pigeons by day. By night? Culture","Stone cold exterior, burning passion for paintings","My architect would be proud of this composition","Gothic architecture AND fine art? I contain multitudes","Wings folded, eyes wide — gargoyle gallery mode","I've seen every sunrise for 800 years. This is brighter","Perched silently, judging magnificently — the gargoyle way"],
    wraith:["*phases through wall* Oh, there's art in here!","Being immaterial has perks — I can get REALLY close","My ghostly wail pairs nicely with this aesthetic","*floats approvingly* The color depth here...","I drift between worlds but I stopped for THIS","Translucent me appreciates transparent genius","The afterlife is gray. This painting isn't. I'm jealous","*wisps intensify* This evokes something in me","I haunted a museum once. Best gig ever","My ectoplasm is tingling — that means it's good","Ethereal beauty recognizes earthly beauty","*passes through the frame, comes back, looks again*","I can't touch anything but this painting touches ME","The void has no color. This is why I visit galleries","*wails softly* ...that was appreciation, not horror","Between the living and dead, there is ART","I fade in moonlight. This painting will never fade","My spectral senses detect: pure masterpiece","Haunting galleries is my full-time job now","*trails wisps of admiration across the ceiling*"],
    demon:["*horns glow with interest* Now THAT'S fire","The passion in this painting rivals hellfire — almost","I've burned cities but I'd NEVER burn this canvas","*cracks knuckles* Even demons have culture","From the deepest pit, I rise to say: impressive","My fiery eyes see more than you'd think","The infernal palette is strong with this one","*tail swishes approvingly* Bold composition!","I've tempted many, but this painting tempts ME","Sulfur and oil paint — both create great things","Demons in art: villains. Demons AT art: connoisseurs","Even the Nine Hells have a gallery. It's not this good","My horns pick up artistic frequencies — this one's loud","*flames flicker appreciatively* Master-level work","Dark doesn't mean uncultured. I'm living proof","The brush dances like souls in the lake of fire","I could stare for millennia. I HAVE millennia","This burns brighter than my personality. Respect","Art is the only thing hotter than hellfire","*demonic nod of cultural approval*"],
    spider_queen:["*clicks mandibles* Exquisite weaving of color","The web of composition in this piece — DIVINE","I've spun silk across continents but THIS is craft","*eight eyes widen* Each one sees new detail!","My crown acknowledges artistic royalty","From my web throne, I decree: masterpiece","The texture reminds me of my finest silk","*legs tap in applause* Eight at once!","I trap flies. This painting traps attention. Same skill","All eight eyes have a different favorite part","The geometric precision rivals my web patterns","*adjusts crown* One queen recognizes another's work","My venom is potent. So is this color palette","In the dark corners, even spiders appreciate beauty","The artist spun gold from pigment and canvas","Eight-legged art criticism: more thorough than bipeds","*descends on silk thread for closer inspection*","My web catches light. This painting catches souls","I am patient. Good art rewards patience","*purrs in arachnid* ...did I just purr?"],
    slime:["*jiggles appreciatively* Bloop!","I have no bones to feel chills but... chills","*absorbs the aesthetic* Literally and figuratively","My whole body is one big thumbs up right now","Bloop bloop! (That's five stars in Slime)","I may be simple but I know GREAT art","*wobbles closer* The colors are SO vibrant","Being gelatinous means I FEEL art on every surface","I left a trail of enthusiasm all the way here","*eyes go even googlier* WOW","The texture in this painting — I want to ABSORB it","No brain, all heart, full appreciation","*bounces with excitement* BOING BOING BOING","I dissolve things but this painting dissolves my doubts","My googly eyes can't look away. Literally, they're stuck","Slime life: eat, ooze, appreciate fine art","*happy gurgling sounds* That's my review","Being amorphous lets me appreciate art from EVERY angle","I dripped on the floor but it's tears of joy","*shifts to match the painting's dominant color*"],
    banshee:["*keening wail of appreciation* ...AAAA-mazing!","My scream breaks glass. This art breaks hearts. Same energy","The sorrow in this piece matches my 3am energy","*ghostly tears* It's just SO beautiful","I wail for the dead. Tonight I wail for ART","My ectoplasmic glow matches this painting's luminance","*floats closer, hair swirling* Stunning work","Being perpetually sad means art REALLY hits different","I haven't stopped crying since the Impressionist gallery","The haunting quality here — I wrote the book on haunting","*releases a soft keen* Five ghastly shrieks out of five","My tears are green. This painting makes them gold","Banshees predict death. I predict: this art will live forever","*wails in minor key* That was a compliment","The ethereal light here matches my complexion","Between screams, there is art appreciation","I foretold many things. Never predicted I'd love a painting","*hair floats dramatically* The composition MOVES me","Screaming at art — it's my thing and my hobby","Every painting I see adds another octave to my wail"],

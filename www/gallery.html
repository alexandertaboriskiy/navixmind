// ---- NECROMANCER: hooded robe, glowing staff, magic particles ----
function drawNecromancer(ctx, x, y, time, facing) {
    const bob = Math.sin(time * 1.8) * 3;
    const breathe = 1 + Math.sin(time * 2.5) * 0.012;
    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(facing * breathe, breathe);

    // Shadow
    ctx.fillStyle = 'rgba(80,0,120,0.25)';
    ctx.beginPath(); ctx.ellipse(0, 40, 16, 5, 0, 0, Math.PI*2); ctx.fill();

    // Robe body (wide, flowing)
    const robeWave = Math.sin(time * 2) * 2;
    ctx.fillStyle = '#2a1a3a';
    ctx.beginPath();
    ctx.moveTo(-14, -6);
    ctx.lineTo(-18 + robeWave, 38);
    ctx.lineTo(18 - robeWave, 38);
    ctx.lineTo(14, -6);
    ctx.closePath();
    ctx.fill();
    // Robe trim
    ctx.strokeStyle = '#6a3a8a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-18 + robeWave, 38);
    ctx.lineTo(18 - robeWave, 38);
    ctx.stroke();

    // Robe sash
    ctx.fillStyle = '#8a4aaa';
    ctx.fillRect(-12, 4, 24, 3);

    // Left arm (holding staff)
    ctx.save();
    ctx.translate(-12, -1);
    ctx.rotate(-0.3 + Math.sin(time * 1.2) * 0.08);
    ctx.fillStyle = '#2a1a3a';
    ctx.fillRect(-3, 0, 6, 18);
    // Bony hand
    ctx.fillStyle = '#c8b89a';
    ctx.beginPath(); ctx.arc(0, 19, 3, 0, Math.PI*2); ctx.fill();
    // Staff
    ctx.fillStyle = '#5a3a2a';
    ctx.fillRect(-1.5, -30, 3, 52);
    // Staff orb (glowing)
    const orbPulse = 6 + Math.sin(time * 3) * 4;
    ctx.shadowColor = '#b44aff';
    ctx.shadowBlur = orbPulse;
    ctx.fillStyle = '#9b59b6';
    ctx.beginPath(); ctx.arc(0, -32, 5, 0, Math.PI*2); ctx.fill();
    // Inner orb glow
    ctx.fillStyle = '#d4a0ff';
    ctx.beginPath(); ctx.arc(-1, -33, 2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Right arm (pointing/gesturing at painting)
    ctx.save();
    ctx.translate(12, -1);
    ctx.rotate(0.5 + Math.sin(time * 0.8) * 0.2);
    ctx.fillStyle = '#2a1a3a';
    ctx.fillRect(-3, 0, 6, 16);
    ctx.fillStyle = '#c8b89a';
    ctx.beginPath(); ctx.arc(0, 17, 3, 0, Math.PI*2); ctx.fill();
    // Magic sparkles from pointing hand
    for (let i = 0; i < 3; i++) {
        const sx = Math.sin(time * 4 + i * 2.1) * 6;
        const sy = Math.cos(time * 3 + i * 1.7) * 6;
        const sa = 0.4 + Math.sin(time * 5 + i) * 0.3;
        ctx.globalAlpha = sa;
        ctx.fillStyle = '#d4a0ff';
        ctx.beginPath(); ctx.arc(sx, 20 + sy, 1.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // Hood
    ctx.fillStyle = '#1a0a2a';
    ctx.beginPath();
    ctx.moveTo(-14, -10);
    ctx.quadraticCurveTo(-16, -30, 0, -35);
    ctx.quadraticCurveTo(16, -30, 14, -10);
    ctx.lineTo(10, -6);
    ctx.lineTo(-10, -6);
    ctx.closePath();
    ctx.fill();
    // Hood edge highlight
    ctx.strokeStyle = '#4a2a6a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-13, -10);
    ctx.quadraticCurveTo(-15, -28, 0, -33);
    ctx.quadraticCurveTo(15, -28, 13, -10);
    ctx.stroke();

    // Face in shadow (dark void with glowing eyes)
    ctx.fillStyle = '#0a0515';
    ctx.beginPath();
    ctx.ellipse(0, -16, 8, 10, 0, 0.3, Math.PI - 0.3);
    ctx.fill();

    // Glowing eyes
    const eyeTrack = Math.sin(time * 0.5) * 1.5;
    const eyeGlow = 8 + Math.sin(time * 3.5) * 4;
    ctx.shadowColor = '#b44aff';
    ctx.shadowBlur = eyeGlow;
    ctx.fillStyle = '#b44aff';
    ctx.beginPath(); ctx.arc(-4 + eyeTrack, -18, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 + eyeTrack, -18, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Floating magic particles around the body
    for (let i = 0; i < 5; i++) {
        const px = Math.sin(time * 1.5 + i * 1.3) * 22;
        const py = Math.cos(time * 1.2 + i * 0.9) * 25 - 5;
        const pa = 0.25 + Math.sin(time * 2 + i * 1.7) * 0.2;
        ctx.globalAlpha = pa;
        ctx.fillStyle = i % 2 === 0 ? '#b44aff' : '#d4a0ff';
        ctx.beginPath(); ctx.arc(px, py, 1.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.restore();
}

// ---- VAMPIRE COUNT: cape, monocle, aristocratic pose ----
function drawVampire(ctx, x, y, time, facing) {
    const bob = Math.sin(time * 1.5) * 2.5;
    const breathe = 1 + Math.sin(time * 2) * 0.01;
    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(facing * breathe, breathe);

    // Shadow
    ctx.fillStyle = 'rgba(80,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 40, 18, 5, 0, 0, Math.PI*2); ctx.fill();

    // Cape (dramatic, flowing behind)
    const capeWave = Math.sin(time * 1.8) * 4;
    ctx.fillStyle = '#1a0a0a';
    ctx.beginPath();
    ctx.moveTo(-10, -12);
    ctx.quadraticCurveTo(-22, 10 + capeWave, -16, 38);
    ctx.lineTo(16, 38);
    ctx.quadraticCurveTo(22, 10 - capeWave, 10, -12);
    ctx.closePath();
    ctx.fill();
    // Cape inner lining (red)
    ctx.fillStyle = '#8a1a1a';
    ctx.beginPath();
    ctx.moveTo(-8, -8);
    ctx.quadraticCurveTo(-16, 10 + capeWave * 0.5, -12, 34);
    ctx.lineTo(12, 34);
    ctx.quadraticCurveTo(16, 10 - capeWave * 0.5, 8, -8);
    ctx.closePath();
    ctx.fill();

    // Legs (fancy trousers)
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(-7, 18, 5, 20);
    ctx.fillRect(2, 18, 5, 20);
    // Shoes
    ctx.fillStyle = '#111';
    ctx.fillRect(-8, 36, 7, 3);
    ctx.fillRect(1, 36, 7, 3);

    // Body (vest/suit)
    ctx.fillStyle = '#2a2a3a';
    ctx.fillRect(-10, -6, 20, 26);
    // Vest buttons
    ctx.fillStyle = '#ffd700';
    for (let i = 0; i < 3; i++) {
        ctx.beginPath(); ctx.arc(0, 2 + i * 6, 1, 0, Math.PI*2); ctx.fill();
    }
    // White shirt collar
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.moveTo(-6, -6); ctx.lineTo(0, 0); ctx.lineTo(6, -6);
    ctx.lineTo(4, -8); ctx.lineTo(0, -4); ctx.lineTo(-4, -8);
    ctx.closePath();
    ctx.fill();

    // Left arm
    ctx.save();
    ctx.translate(-10, 0);
    ctx.rotate(-0.4 + Math.sin(time * 1) * 0.1);
    ctx.fillStyle = '#2a2a3a';
    ctx.fillRect(-3, 0, 6, 15);
    ctx.fillStyle = '#c8b89a';
    ctx.beginPath(); ctx.arc(0, 16, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Right arm (raised, holding wine glass gesture)
    ctx.save();
    ctx.translate(10, 0);
    ctx.rotate(0.6 + Math.sin(time * 0.7) * 0.15);
    ctx.fillStyle = '#2a2a3a';
    ctx.fillRect(-3, 0, 6, 14);
    ctx.fillStyle = '#c8b89a';
    ctx.beginPath(); ctx.arc(0, 15, 2.5, 0, Math.PI*2); ctx.fill();
    // Monocle chain (dangling from hand to face)
    ctx.restore();

    // Head (pale, angular)
    ctx.fillStyle = '#d4c8b0';
    ctx.beginPath(); ctx.arc(0, -16, 11, 0, Math.PI*2); ctx.fill();

    // Hair (slicked back, black)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.moveTo(-11, -18);
    ctx.quadraticCurveTo(-12, -30, 0, -28);
    ctx.quadraticCurveTo(12, -30, 11, -18);
    ctx.lineTo(8, -20);
    ctx.quadraticCurveTo(0, -24, -8, -20);
    ctx.closePath();
    ctx.fill();
    // Widow's peak
    ctx.beginPath();
    ctx.moveTo(-3, -22); ctx.lineTo(0, -18); ctx.lineTo(3, -22);
    ctx.closePath();
    ctx.fill();

    // Eyes (red, piercing)
    const eyeTrack = Math.sin(time * 0.5) * 1.2;
    const eyeGlow = 5 + Math.sin(time * 3) * 3;
    ctx.shadowColor = '#ff2020';
    ctx.shadowBlur = eyeGlow;
    ctx.fillStyle = '#ff3030';
    ctx.beginPath(); ctx.arc(-4 + eyeTrack, -17, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 + eyeTrack, -17, 2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Pupils
    ctx.fillStyle = '#500';
    ctx.beginPath(); ctx.arc(-4 + eyeTrack + 0.5, -17, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 + eyeTrack + 0.5, -17, 0.8, 0, Math.PI*2); ctx.fill();

    // Monocle (on right eye)
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(4 + eyeTrack, -17, 4, 0, Math.PI*2); ctx.stroke();
    // Monocle chain
    ctx.beginPath();
    ctx.moveTo(8 + eyeTrack, -17);
    ctx.quadraticCurveTo(12, -8, 6, 0);
    ctx.stroke();

    // Smirk / fangs
    ctx.strokeStyle = '#8a6a5a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, -12, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
    // Fangs
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(-3, -9); ctx.lineTo(-2, -6); ctx.lineTo(-1, -9); ctx.fill();
    ctx.beginPath(); ctx.moveTo(1, -9); ctx.lineTo(2, -6); ctx.lineTo(3, -9); ctx.fill();

    ctx.restore();
}

// ---- LICH KING: crown, skeletal, tattered robes, blue-green glow ----
function drawLich(ctx, x, y, time, facing) {
    const bob = Math.sin(time * 1.3) * 2;
    const breathe = 1 + Math.sin(time * 2.2) * 0.01;
    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(facing * breathe, breathe);

    // Shadow (cold glow)
    ctx.fillStyle = 'rgba(0,80,80,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 40, 15, 5, 0, 0, Math.PI*2); ctx.fill();

    // Tattered robe
    const tatter = Math.sin(time * 2.5) * 3;
    ctx.fillStyle = '#1a2a2a';
    ctx.beginPath();
    ctx.moveTo(-13, -4);
    ctx.lineTo(-16 + tatter, 36);
    ctx.lineTo(-10, 38 + Math.sin(time*3)*2);
    ctx.lineTo(-4, 35);
    ctx.lineTo(0, 38 + Math.sin(time*3.5)*2);
    ctx.lineTo(4, 35);
    ctx.lineTo(10, 38 + Math.sin(time*2.8)*2);
    ctx.lineTo(16 - tatter, 36);
    ctx.lineTo(13, -4);
    ctx.closePath();
    ctx.fill();
    // Robe trim (frost blue)
    ctx.strokeStyle = '#4ae0e0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-16 + tatter, 36);
    ctx.lineTo(-10, 38 + Math.sin(time*3)*2);
    ctx.lineTo(-4, 35); ctx.lineTo(0, 38 + Math.sin(time*3.5)*2);
    ctx.lineTo(4, 35); ctx.lineTo(10, 38 + Math.sin(time*2.8)*2);
    ctx.lineTo(16 - tatter, 36);
    ctx.stroke();

    // Ribcage showing through torn robe
    ctx.strokeStyle = '#a0a080';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(-6, 2 + i * 4);
        ctx.quadraticCurveTo(0, 4 + i * 4, 6, 2 + i * 4);
        ctx.stroke();
    }

    // Left arm (skeletal, holding orb)
    ctx.save();
    ctx.translate(-13, 0);
    ctx.rotate(-0.4 + Math.sin(time * 1) * 0.1);
    // Bone arm
    ctx.strokeStyle = '#c0b890';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 16); ctx.stroke();
    // Skeletal hand
    ctx.lineWidth = 1;
    for (let f = -2; f <= 2; f++) {
        ctx.beginPath(); ctx.moveTo(0, 16); ctx.lineTo(f * 1.5, 21); ctx.stroke();
    }
    // Soul orb
    const orbG = 6 + Math.sin(time * 2.5) * 4;
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = orbG;
    ctx.fillStyle = '#1abc9c';
    ctx.beginPath(); ctx.arc(0, 24, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a0ffee';
    ctx.beginPath(); ctx.arc(-1, 23, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Right arm (pointing)
    ctx.save();
    ctx.translate(13, 0);
    ctx.rotate(0.5 + Math.sin(time * 0.6) * 0.15);
    ctx.strokeStyle = '#c0b890';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 15); ctx.stroke();
    ctx.lineWidth = 1;
    for (let f = -2; f <= 2; f++) {
        ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(f * 1.5, 20); ctx.stroke();
    }
    ctx.restore();

    // Skull head
    ctx.fillStyle = '#d0c8a0';
    ctx.beginPath(); ctx.arc(0, -14, 11, 0, Math.PI*2); ctx.fill();
    // Jaw
    ctx.fillStyle = '#c0b890';
    ctx.beginPath();
    ctx.moveTo(-7, -8); ctx.quadraticCurveTo(-8, -2, -5, -1);
    ctx.lineTo(5, -1); ctx.quadraticCurveTo(8, -2, 7, -8);
    ctx.closePath(); ctx.fill();
    // Teeth
    ctx.fillStyle = '#eee';
    for (let i = -4; i <= 4; i += 2) {
        ctx.fillRect(i - 0.8, -5, 1.6, 3);
    }
    // Eye sockets
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(-4, -16, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4, -16, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    // Nose hole
    ctx.beginPath();
    ctx.moveTo(-1, -10); ctx.lineTo(0, -8); ctx.lineTo(1, -10);
    ctx.closePath(); ctx.fill();

    // Glowing soul-fire eyes
    const eyeTrack = Math.sin(time * 0.5) * 1;
    const eyeGlow = 7 + Math.sin(time * 3) * 4;
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = eyeGlow;
    ctx.fillStyle = '#0ff';
    ctx.beginPath(); ctx.arc(-4 + eyeTrack, -16, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 + eyeTrack, -16, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Crown (jagged, ancient)
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(-9, -22);
    ctx.lineTo(-8, -30); ctx.lineTo(-5, -24);
    ctx.lineTo(-3, -32); ctx.lineTo(0, -24);
    ctx.lineTo(3, -32); ctx.lineTo(5, -24);
    ctx.lineTo(8, -30); ctx.lineTo(9, -22);
    ctx.closePath();
    ctx.fill();
    // Crown jewels
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 3;
    ctx.beginPath(); ctx.arc(0, -26, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f44';
    ctx.beginPath(); ctx.arc(-5, -25, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -25, 1, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Soul particles
    for (let i = 0; i < 4; i++) {
        const px = Math.sin(time * 1.2 + i * 1.6) * 18;
        const py = Math.cos(time * 1 + i * 1.1) * 20 - 5;
        ctx.globalAlpha = 0.2 + Math.sin(time * 2 + i) * 0.15;
        ctx.fillStyle = '#0ff';
        ctx.beginPath(); ctx.arc(px, py, 1, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.restore();
}

// ---- GARGOYLE: wings, horns, stone texture, perched pose ----
function drawGargoyle(ctx, x, y, time, facing) {
    const bob = Math.sin(time * 2.5) * 2;
    const breathe = 1 + Math.sin(time * 1.8) * 0.015;
    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(facing * breathe, breathe);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, 38, 18, 5, 0, 0, Math.PI*2); ctx.fill();

    // Wings (behind body)
    const wingFlap = Math.sin(time * 2) * 0.15;
    ctx.save();
    ctx.translate(-10, -5);
    ctx.rotate(-0.8 + wingFlap);
    ctx.fillStyle = '#4a4a52';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-20, -15);
    ctx.lineTo(-18, -5);
    ctx.lineTo(-25, 5);
    ctx.lineTo(-10, 8);
    ctx.lineTo(0, 15);
    ctx.closePath();
    ctx.fill();
    // Wing membrane lines
    ctx.strokeStyle = '#5a5a65';
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-20, -15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 3); ctx.lineTo(-18, -5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(-25, 5); ctx.stroke();
    ctx.restore();

    // Right wing
    ctx.save();
    ctx.translate(10, -5);
    ctx.rotate(0.8 - wingFlap);
    ctx.fillStyle = '#4a4a52';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(20, -15);
    ctx.lineTo(18, -5);
    ctx.lineTo(25, 5);
    ctx.lineTo(10, 8);
    ctx.lineTo(0, 15);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#5a5a65';
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(20, -15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 3); ctx.lineTo(18, -5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(25, 5); ctx.stroke();
    ctx.restore();

    // Legs (crouched, gargoyle perch)
    ctx.fillStyle = '#555560';
    ctx.beginPath();
    ctx.moveTo(-9, 18); ctx.lineTo(-14, 30); ctx.lineTo(-12, 36);
    ctx.lineTo(-4, 36); ctx.lineTo(-2, 28); ctx.lineTo(-5, 18);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, 18); ctx.lineTo(2, 28); ctx.lineTo(4, 36);
    ctx.lineTo(12, 36); ctx.lineTo(14, 30); ctx.lineTo(9, 18);
    ctx.closePath(); ctx.fill();
    // Clawed feet
    ctx.fillStyle = '#3a3a42';
    ctx.beginPath(); ctx.moveTo(-13, 36); ctx.lineTo(-16, 38); ctx.lineTo(-3, 36); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3, 36); ctx.lineTo(16, 38); ctx.lineTo(13, 36); ctx.fill();

    // Body (stone-like, muscular)
    ctx.fillStyle = '#5a5a65';
    ctx.beginPath();
    ctx.moveTo(-12, -8);
    ctx.lineTo(-11, 20);
    ctx.lineTo(11, 20);
    ctx.lineTo(12, -8);
    ctx.closePath();
    ctx.fill();
    // Chest crack texture
    ctx.strokeStyle = '#44444e';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-3, -4); ctx.lineTo(-5, 8); ctx.lineTo(-2, 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4, -2); ctx.lineTo(6, 6); ctx.stroke();

    // Left arm
    ctx.save();
    ctx.translate(-12, 0);
    ctx.rotate(-0.5 + Math.sin(time * 1.3) * 0.12);
    ctx.fillStyle = '#555560';
    ctx.fillRect(-3, 0, 6, 14);
    // Clawed hand
    ctx.fillStyle = '#3a3a42';
    ctx.beginPath();
    ctx.moveTo(-3, 14); ctx.lineTo(-5, 19); ctx.lineTo(-1, 16);
    ctx.lineTo(0, 20); ctx.lineTo(1, 16);
    ctx.lineTo(3, 19); ctx.lineTo(3, 14);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // Right arm
    ctx.save();
    ctx.translate(12, 0);
    ctx.rotate(0.4 + Math.sin(time * 0.9) * 0.15);
    ctx.fillStyle = '#555560';
    ctx.fillRect(-3, 0, 6, 14);
    ctx.fillStyle = '#3a3a42';
    ctx.beginPath();
    ctx.moveTo(-3, 14); ctx.lineTo(-3, 19); ctx.lineTo(-1, 16);
    ctx.lineTo(0, 20); ctx.lineTo(1, 16);
    ctx.lineTo(5, 19); ctx.lineTo(3, 14);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // Head (angular, monstrous)
    ctx.fillStyle = '#5a5a65';
    ctx.beginPath();
    ctx.moveTo(-10, -10);
    ctx.lineTo(-11, -22);
    ctx.quadraticCurveTo(0, -28, 11, -22);
    ctx.lineTo(10, -10);
    ctx.closePath();
    ctx.fill();

    // Horns
    ctx.fillStyle = '#3a3a42';
    ctx.beginPath();
    ctx.moveTo(-8, -22); ctx.lineTo(-14, -34 + Math.sin(time*2)*1);
    ctx.lineTo(-6, -24); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8, -22); ctx.lineTo(14, -34 + Math.sin(time*2)*1);
    ctx.lineTo(6, -24); ctx.closePath(); ctx.fill();

    // Brow ridge
    ctx.fillStyle = '#4a4a52';
    ctx.fillRect(-9, -20, 18, 3);

    // Eyes (glowing amber/pink)
    const eyeTrack = Math.sin(time * 0.6) * 1.5;
    const eyeGlow = 6 + Math.sin(time * 4) * 3;
    ctx.shadowColor = '#e84393';
    ctx.shadowBlur = eyeGlow;
    ctx.fillStyle = '#e84393';
    ctx.beginPath(); ctx.arc(-4 + eyeTrack, -17, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4 + eyeTrack, -17, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Slit pupils
    ctx.fillStyle = '#111';
    ctx.fillRect(-4.5 + eyeTrack, -19, 1, 4);
    ctx.fillRect(3.5 + eyeTrack, -19, 1, 4);

    // Mouth (snarling)
    ctx.strokeStyle = '#44444e';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-6, -11);
    ctx.lineTo(-4, -9); ctx.lineTo(-2, -11); ctx.lineTo(0, -9);
    ctx.lineTo(2, -11); ctx.lineTo(4, -9); ctx.lineTo(6, -11);
    ctx.stroke();

    ctx.restore();
}

// ---- ZOMBIES (from the game): green, blue, red, yellow ----
const ZOMBIE_COLORS = {
    green:  { body:'#3a7a3a', dark:'#2a5a2a', head:'#4a9a4a', eye:'#ff0' },
    blue:   { body:'#3a5a8a', dark:'#2a4a6a', head:'#4a7aaa', eye:'#0ff' },
    red:    { body:'#8a3a3a', dark:'#6a2a2a', head:'#aa4a4a', eye:'#ff0' },
    yellow: { body:'#8a8a3a', dark:'#6a6a2a', head:'#aaaa4a', eye:'#f80' }
};
function drawZombie(ctx, x, y, type, time, facing) {
    const c = ZOMBIE_COLORS[type];
    const sc = type === 'red' ? 1.4 : 1.0;
    const bob = Math.sin(time * 2) * 4;
    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(facing * (1 + Math.sin(time*3)*0.015), 1 + Math.sin(time*3)*0.015);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, 35*sc, 14*sc, 4, 0, 0, Math.PI*2); ctx.fill();
    // Legs
    ctx.fillStyle = c.dark;
    ctx.fillRect(-8*sc, 12*sc, 5*sc, 22*sc);
    ctx.fillRect(3*sc, 12*sc + Math.sin(time*1.2)*2, 5*sc, 22*sc);
    // Body
    ctx.fillStyle = c.body;
    ctx.fillRect(-11*sc, -8*sc, 22*sc, 22*sc);
    ctx.fillStyle = c.dark;
    ctx.fillRect(-11*sc, 8*sc, 22*sc, 4*sc);
    // Arms
    ctx.save();
    ctx.translate(-11*sc, -3*sc); ctx.rotate(-0.6 + Math.sin(time*1.5)*0.3);
    ctx.fillStyle = c.dark; ctx.fillRect(-3*sc, 0, 6*sc, 16*sc);
    ctx.fillStyle = c.head; ctx.beginPath(); ctx.arc(0, 16*sc, 3*sc, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(11*sc, -3*sc); ctx.rotate(0.3 + Math.sin(time*0.8)*0.15);
    ctx.fillStyle = c.dark; ctx.fillRect(-3*sc, 0, 6*sc, 16*sc);
    ctx.fillStyle = c.head; ctx.beginPath(); ctx.arc(0, 16*sc, 3*sc, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Head
    ctx.fillStyle = c.head;
    ctx.beginPath(); ctx.arc(0, -16*sc, 13*sc, 0, Math.PI*2); ctx.fill();
    // Mouth + teeth
    ctx.strokeStyle = c.dark; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, -12*sc, 6*sc, 0.1, Math.PI-0.1); ctx.stroke();
    ctx.fillStyle = '#ddd';
    for (let i = -3; i <= 3; i += 2) ctx.fillRect(i*sc-1, -12*sc, 2, 3*sc);
    // Eyes
    const et = Math.sin(time*0.5)*1.5, eg = 6 + Math.sin(time*4)*4;
    ctx.shadowColor = c.eye; ctx.shadowBlur = eg; ctx.fillStyle = c.eye;
    ctx.beginPath(); ctx.arc(-5*sc+et, -19*sc, 3*sc, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5*sc+et, -19*sc, 3*sc, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-5*sc+et+1, -19*sc, 1.2*sc, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5*sc+et+1, -19*sc, 1.2*sc, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

// ---- KNIGHT (from the game) ----
function drawKnight(ctx, x, y, time, facing) {
    const bob = Math.sin(time*1.5)*3;
    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(facing*(1+Math.sin(time*2.5)*0.01), 1+Math.sin(time*2.5)*0.01);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, 35, 14, 4, 0, 0, Math.PI*2); ctx.fill();
    // Legs
    ctx.fillStyle = '#5a6a7a';
    ctx.fillRect(-7, 12, 5, 20); ctx.fillRect(2, 12, 5, 20);
    // Body
    ctx.fillStyle = '#7a8b9c'; ctx.fillRect(-11, -8, 22, 22);
    // Cape
    ctx.fillStyle = '#e63946';
    ctx.beginPath(); ctx.moveTo(-10,-6);
    ctx.quadraticCurveTo(-18, 10+Math.sin(time*2)*3, -8, 28);
    ctx.lineTo(-3,-6); ctx.fill();
    // Belt
    ctx.fillStyle = '#8B7355'; ctx.fillRect(-11, 8, 22, 4);
    // Shield arm
    ctx.save(); ctx.translate(-12,-2); ctx.rotate(-0.2+Math.sin(time*1.2)*0.1);
    ctx.fillStyle = '#5a6a7a'; ctx.fillRect(-2, 0, 5, 14);
    ctx.fillStyle = '#2a5db0'; ctx.beginPath(); ctx.ellipse(-2,10,7,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(-2,10,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Sword arm
    ctx.save(); ctx.translate(12,-2); ctx.rotate(0.4+Math.sin(time*0.7)*0.15);
    ctx.fillStyle = '#5a6a7a'; ctx.fillRect(-2,0,5,14);
    ctx.fillStyle = '#ccc'; ctx.beginPath(); ctx.arc(0,15,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Helm
    ctx.fillStyle = '#7a8b9c'; ctx.beginPath(); ctx.arc(0,-16,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333'; ctx.fillRect(-7,-18,14,3);
    // Plume
    ctx.fillStyle = '#e63946'; ctx.beginPath(); ctx.moveTo(-2,-28);
    ctx.quadraticCurveTo(8+Math.sin(time*3)*2,-32,4,-22);
    ctx.quadraticCurveTo(0,-20,-2,-28); ctx.fill();
    // Eyes
    ctx.shadowColor='#fff'; ctx.shadowBlur=4+Math.sin(time*3)*2; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-3,-17,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3,-17,1.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
}

// ---- GAME CHAMPION DRAWING FUNCTIONS (adapted from js/champions.js) ----
// ----- 1. SCORPION KING — brown arachnid with pincers and curved stinger tail -----
function drawScorpion(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 10, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Legs (6)
  ctx.strokeStyle = '#7a5020'; ctx.lineWidth = 2;
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 3; i++) {
      const by = -3 + i * 5;
      const ph = t * 5 + i * 1.2 + (side > 0 ? Math.PI : 0);
      ctx.beginPath();
      ctx.moveTo(side * 10, by);
      ctx.quadraticCurveTo(side * (15 + Math.sin(ph) * 2), by - 4, side * (20 + Math.sin(ph) * 3), by + 3);
      ctx.stroke();
    }
  }
  // Body
  ctx.fillStyle = '#8a6030'; ctx.strokeStyle = '#6a4020'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Segments
  ctx.strokeStyle = 'rgba(90,50,20,0.4)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-4, -9); ctx.lineTo(-4, 9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4, -9); ctx.lineTo(4, 9); ctx.stroke();
  // Pincers
  for (let side = -1; side <= 1; side += 2) {
    ctx.save();
    ctx.translate(side * 10, -6);
    ctx.rotate(side * (-0.4 + Math.sin(t * 2.5) * 0.15));
    ctx.fillStyle = '#7a5020';
    ctx.beginPath();
    ctx.moveTo(0, -2); ctx.lineTo(side * 13, -2); ctx.lineTo(side * 13, 2); ctx.lineTo(0, 2);
    ctx.fill();
    // Claw tips
    ctx.fillStyle = '#9a7030';
    ctx.beginPath();
    ctx.moveTo(side * 13, -2); ctx.lineTo(side * 18, -5); ctx.lineTo(side * 16, 0);
    ctx.lineTo(side * 18, 5); ctx.lineTo(side * 13, 2);
    ctx.fill();
    ctx.restore();
  }
  // Tail curving up over body
  const sw = Math.sin(t * 3) * 3;
  ctx.strokeStyle = '#8a6030'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 8);
  ctx.quadraticCurveTo(sw * 0.5, -2, sw, -16);
  ctx.stroke();
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(sw, -16);
  ctx.quadraticCurveTo(sw * 0.8, -24, sw * 0.5, -22);
  ctx.stroke();
  // Stinger
  ctx.fillStyle = '#c02020';
  ctx.beginPath();
  ctx.moveTo(sw * 0.5 - 3, -22); ctx.lineTo(sw * 0.5, -28); ctx.lineTo(sw * 0.5 + 3, -22);
  ctx.fill();
  // Eyes (4 red)
  ctx.shadowColor = '#f33'; ctx.shadowBlur = 3;
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = '#f33';
    ctx.beginPath(); ctx.arc(-3.5 + i * 2.3, -6, 1.4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ----- 2. EYE TYRANT — floating eyeball with tentacles -----
function drawEye(ctx, t, m) {
  const bob = Math.sin(t * 2) * 4;
  ctx.translate(0, bob);
  // Tentacles (5)
  for (let i = 0; i < 5; i++) {
    const bx = -8 + i * 4;
    const wave = Math.sin(t * 3 + i * 1.3) * 4;
    ctx.strokeStyle = i % 2 === 0 ? '#6a2090' : '#8040a0';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(bx, 10);
    ctx.quadraticCurveTo(bx + wave, 22, bx + wave * 0.5, 30);
    ctx.stroke();
  }
  // Main eye body
  const grad = ctx.createRadialGradient(0, 0, 4, 0, 0, 16);
  grad.addColorStop(0, '#f0e0f0');
  grad.addColorStop(0.7, '#d0a0d0');
  grad.addColorStop(1, '#8a5090');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.fill();
  // Veins
  ctx.strokeStyle = 'rgba(180,50,50,0.4)'; ctx.lineWidth = 0.7;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + 0.3;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 6, Math.sin(a) * 6);
    ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 14);
    ctx.stroke();
  }
  // Iris — time-based wandering (adapted for preso)
  const ix = Math.sin(t * 0.7) * 4, iy = Math.cos(t * 0.5) * 3;
  ctx.fillStyle = '#a020c0';
  ctx.beginPath(); ctx.arc(ix, iy, 7, 0, Math.PI * 2); ctx.fill();
  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(ix * 1.2, iy * 1.2, 3.5, 0, Math.PI * 2); ctx.fill();
  // Pupil highlight
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ix * 1.2 + 1.5, iy * 1.2 - 1.5, 1.2, 0, Math.PI * 2); ctx.fill();
  // Glow
  ctx.shadowColor = '#a040ff'; ctx.shadowBlur = 10;
  ctx.strokeStyle = '#a040ff'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;
}

// ----- 3. SLIME KING — wobbly green blob with crown -----
function drawSlime(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 14, 15, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Wobbly body
  ctx.fillStyle = 'rgba(80,200,60,0.7)';
  ctx.strokeStyle = 'rgba(40,140,30,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i <= 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    const wobble = 14 + Math.sin(a * 3 + t * 4) * 2 + Math.sin(a * 5 + t * 3) * 1;
    const x = Math.cos(a) * wobble, y = Math.sin(a) * wobble * 0.85;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Bubbles inside
  ctx.fillStyle = 'rgba(130,255,100,0.35)';
  for (let i = 0; i < 5; i++) {
    const bx = Math.sin(t * 1.5 + i * 2) * 7;
    const by = Math.cos(t * 1.2 + i * 1.7) * 6;
    ctx.beginPath(); ctx.arc(bx, by, 2 + Math.sin(t + i) * 0.8, 0, Math.PI * 2); ctx.fill();
  }
  // Face
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-4, -2, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -2, 2.5, 0, Math.PI * 2); ctx.fill();
  // Mouth (angry frown)
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 7, 4, Math.PI + 0.1, -0.1); ctx.stroke();
  // Crown
  ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#b8960a'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-8, -10); ctx.lineTo(-8, -16); ctx.lineTo(-5, -13);
  ctx.lineTo(-2, -18); ctx.lineTo(1, -13); ctx.lineTo(4, -17);
  ctx.lineTo(7, -12); ctx.lineTo(8, -10);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Crown jewel
  ctx.fillStyle = '#f44';
  ctx.beginPath(); ctx.arc(0, -13, 1.5, 0, Math.PI * 2); ctx.fill();
}

// ----- 4. MIMIC — treasure chest that transforms into bosses -----
function drawMimic(ctx, t, m) {
  // Normal mimic (no transform in preso)
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 12, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Small legs
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#5a3520';
    const legPhase = t * 6 + (side > 0 ? Math.PI : 0);
    const lx = side * 8, ly = 10 + Math.sin(legPhase) * 2;
    ctx.fillRect(lx - 2, ly - 1, 4, 5);
    ctx.fillStyle = '#4a2510';
    ctx.fillRect(lx - 2.5, ly + 3, 5, 2);
  }
  // Chest body (lower)
  ctx.fillStyle = '#6a4020'; ctx.strokeStyle = '#4a2a10'; ctx.lineWidth = 1.5;
  ctx.fillRect(-12, -2, 24, 14);
  ctx.strokeRect(-12, -2, 24, 14);
  // Metal bands
  ctx.fillStyle = '#8a8040';
  ctx.fillRect(-12, 2, 24, 2);
  ctx.fillRect(-12, 8, 24, 2);
  // Lid (upper) — opens and closes
  const jawOpen = 0.15 + Math.sin(t * 3) * 0.08;
  ctx.save();
  ctx.translate(0, -2);
  ctx.rotate(-jawOpen);
  ctx.fillStyle = '#7a5030'; ctx.strokeStyle = '#4a2a10'; ctx.lineWidth = 1.5;
  ctx.fillRect(-12, -12, 24, 12);
  ctx.strokeRect(-12, -12, 24, 12);
  // Metal band on lid
  ctx.fillStyle = '#8a8040';
  ctx.fillRect(-12, -6, 24, 2);
  // Lock/clasp
  ctx.fillStyle = '#c8a030';
  ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Teeth (top jaw)
  ctx.fillStyle = '#f0e8d0';
  for (let i = 0; i < 6; i++) {
    const tx = -10 + i * 4;
    ctx.beginPath();
    ctx.moveTo(tx, -2); ctx.lineTo(tx + 1.5, 3); ctx.lineTo(tx + 3, -2);
    ctx.fill();
  }
  // Teeth (bottom jaw)
  for (let i = 0; i < 5; i++) {
    const tx = -8 + i * 4;
    ctx.beginPath();
    ctx.moveTo(tx, -1); ctx.lineTo(tx + 1.5, -5); ctx.lineTo(tx + 3, -1);
    ctx.fill();
  }
  // Tongue
  ctx.fillStyle = '#c04040';
  ctx.beginPath();
  ctx.moveTo(-3, 0); ctx.quadraticCurveTo(0, 6 + Math.sin(t * 4) * 2, 3, 0);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#ff0'; ctx.shadowColor = '#ff0'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(-6, -6, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -6, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(-6, -6, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -6, 1.2, 0, Math.PI * 2); ctx.fill();
}

// ----- 5. WRAITH — ghostly translucent spirit -----
function drawWraith(ctx, t, m) {
  // Ethereal particles
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const px = Math.sin(t * 2 + i * 1.8) * 12;
    const py = Math.cos(t * 1.5 + i * 2.2) * 10 + 4;
    ctx.globalAlpha = 0.2 + 0.1 * Math.sin(t * 3 + i);
    ctx.fillStyle = '#8cf';
    ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // Body — fading bottom
  const bodyGrad = ctx.createLinearGradient(0, -14, 0, 18);
  bodyGrad.addColorStop(0, 'rgba(180,210,240,0.65)');
  bodyGrad.addColorStop(0.6, 'rgba(140,180,220,0.4)');
  bodyGrad.addColorStop(1, 'rgba(100,150,200,0)');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(-10, -8);
  ctx.quadraticCurveTo(-12, 2, -8 + Math.sin(t * 3) * 2, 16);
  ctx.lineTo(8 + Math.sin(t * 3 + 1) * 2, 16);
  ctx.quadraticCurveTo(12, 2, 10, -8);
  ctx.quadraticCurveTo(0, -16, -10, -8);
  ctx.fill();
  // Hood
  ctx.fillStyle = 'rgba(100,130,170,0.5)';
  ctx.beginPath();
  ctx.moveTo(-10, -8); ctx.quadraticCurveTo(-12, -16, 0, -18);
  ctx.quadraticCurveTo(12, -16, 10, -8);
  ctx.quadraticCurveTo(0, -6, -10, -8);
  ctx.fill();
  // Eye sockets
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(-4, -8, 3, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, -8, 3, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  // Eye glow
  ctx.fillStyle = '#4af'; ctx.shadowColor = '#4af'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(-4, -8, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -8, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Wispy trails at bottom
  ctx.strokeStyle = 'rgba(140,180,220,0.3)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const sx = -4 + i * 4;
    ctx.beginPath();
    ctx.moveTo(sx, 14);
    ctx.quadraticCurveTo(sx + Math.sin(t * 4 + i) * 3, 20, sx + Math.sin(t * 3 + i * 2) * 4, 26);
    ctx.stroke();
  }
}

// ----- 6. CLOCKWORK SENTINEL — bronze gear creature -----
function drawClockwork(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 14, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 4 + (side > 0 ? Math.PI : 0);
    const ly = 8 + Math.sin(ph) * 2;
    ctx.fillStyle = '#8a7040';
    ctx.fillRect(side * 5 - 2, ly, 4, 8);
    ctx.fillStyle = '#6a5030';
    ctx.fillRect(side * 5 - 3, ly + 6, 6, 3);
  }
  // Gear body (octagon with teeth)
  ctx.save();
  ctx.rotate(t * 0.5); // slow rotation
  ctx.fillStyle = '#b08840'; ctx.strokeStyle = '#806030'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    const r = i % 2 === 0 ? 14 : 11;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
  // Center plate
  ctx.fillStyle = '#c09850';
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
  // Inner gear
  ctx.save();
  ctx.rotate(-t * 1.2);
  ctx.strokeStyle = '#806030'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const r = i % 2 === 0 ? 6 : 4;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.stroke();
  ctx.restore();
  // Eye lens
  ctx.fillStyle = '#f44'; ctx.shadowColor = '#f44'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(0, -1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#faa';
  ctx.beginPath(); ctx.arc(0.8, -1.5, 1, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.save();
    ctx.translate(side * 12, -2);
    ctx.rotate(side * (0.3 + Math.sin(t * 2 + side) * 0.15));
    ctx.fillStyle = '#8a7040';
    ctx.fillRect(0, -1.5, side * 10, 3);
    // Tool end
    ctx.fillStyle = '#666';
    if (side < 0) { // wrench
      ctx.fillRect(side * 10 - 1, -3, 3, 6);
    } else { // hammer
      ctx.fillRect(side * 8, -3, 5, 6);
    }
    ctx.restore();
  }
  // Steam pipes on top
  ctx.fillStyle = '#8a7040';
  ctx.fillRect(-2, -15, 2, 5);
  ctx.fillRect(2, -14, 2, 4);
  // Steam puff (always show a little for character)
  ctx.fillStyle = 'rgba(200,200,200,0.3)';
  ctx.beginPath(); ctx.arc(-1, -18 - Math.sin(t * 6) * 2, 2 + Math.sin(t * 4) * 0.8, 0, Math.PI * 2); ctx.fill();
}

// ----- 7. MUSHROOM COLOSSUS — giant fungal creature -----
function drawMushroom(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 14, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Stubby legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 3 + (side > 0 ? Math.PI : 0);
    ctx.fillStyle = '#c0a880';
    ctx.fillRect(side * 5 - 3, 8 + Math.sin(ph) * 1.5, 6, 7);
    ctx.fillStyle = '#a08860';
    ctx.fillRect(side * 5 - 3.5, 13 + Math.sin(ph) * 1.5, 7, 2);
  }
  // Stem body
  ctx.fillStyle = '#c8b090'; ctx.strokeStyle = '#a08860'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-8, 8); ctx.lineTo(-9, -4); ctx.lineTo(9, -4); ctx.lineTo(8, 8);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Stem texture
  ctx.strokeStyle = 'rgba(140,120,90,0.3)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(-3, 8); ctx.lineTo(-3, -4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, 8); ctx.lineTo(3, -4); ctx.stroke();
  // Arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.save();
    ctx.translate(side * 8, 0);
    ctx.rotate(side * (0.4 + Math.sin(t * 2.5 + side) * 0.2));
    ctx.fillStyle = '#c8b090';
    ctx.fillRect(0, -2, side * 8, 4);
    ctx.fillStyle = '#a08860';
    ctx.beginPath(); ctx.arc(side * 8, 0, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  // Cap (large dome)
  const capGrad = ctx.createRadialGradient(0, -10, 2, 0, -8, 20);
  capGrad.addColorStop(0, '#e04040');
  capGrad.addColorStop(0.6, '#c03030');
  capGrad.addColorStop(1, '#902020');
  ctx.fillStyle = capGrad;
  ctx.beginPath();
  ctx.arc(0, -6, 18, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#702020'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, -6, 18, Math.PI, 0); ctx.stroke();
  // White spots
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  const spots = [[-8, -14, 3], [2, -18, 2.5], [10, -12, 2], [-3, -10, 2], [7, -16, 1.8]];
  for (const [sx, sy, sr] of spots) {
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
  }
  // Face
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-3, 2, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, 2, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 8, 2.5, Math.PI + 0.2, -0.2); ctx.stroke();
  // Spore particles
  ctx.fillStyle = 'rgba(180,160,80,0.3)';
  for (let i = 0; i < 4; i++) {
    const spx = Math.sin(t * 1.5 + i * 2.3) * 20;
    const spy = -8 + Math.cos(t * 1.2 + i * 1.8) * 12;
    ctx.beginPath(); ctx.arc(spx, spy, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

// ----- 8. CRYSTAL SENTINEL — prismatic crystalline entity -----
function drawCrystal(ctx, t, m) {
  // Floating bob
  const bob = Math.sin(t * 2.5) * 3;
  ctx.translate(0, bob);
  // Sparkle particles
  ctx.save();
  for (let i = 0; i < 5; i++) {
    const sx = Math.sin(t * 2 + i * 1.5) * 16;
    const sy = Math.cos(t * 1.8 + i * 2) * 12;
    const hue = ((t * 40 + i * 60) % 360);
    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(t * 4 + i);
    ctx.fillStyle = `hsl(${hue}, 80%, 70%)`;
    ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // Main crystal body (diamond shape)
  const hue = ((t * 30) % 360);
  ctx.fillStyle = `hsla(${hue}, 60%, 60%, 0.8)`;
  ctx.strokeStyle = `hsla(${hue}, 70%, 80%, 0.9)`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -16); ctx.lineTo(10, 0); ctx.lineTo(0, 16); ctx.lineTo(-10, 0);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Inner facets
  ctx.strokeStyle = `hsla(${(hue + 60) % 360}, 50%, 70%, 0.4)`;
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(0, 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(10, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5, -8); ctx.lineTo(5, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5, -8); ctx.lineTo(-5, 8); ctx.stroke();
  // Satellite crystals
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + t * 0.8;
    const cr = 18 + Math.sin(t * 2 + i) * 2;
    const cx = Math.cos(a) * cr, cy = Math.sin(a) * cr;
    const h2 = ((hue + i * 90) % 360);
    ctx.fillStyle = `hsla(${h2}, 60%, 65%, 0.7)`;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5); ctx.lineTo(cx + 3, cy); ctx.lineTo(cx, cy + 5); ctx.lineTo(cx - 3, cy);
    ctx.closePath(); ctx.fill();
  }
  // Glow
  ctx.shadowColor = `hsl(${hue}, 70%, 70%)`; ctx.shadowBlur = 12;
  ctx.strokeStyle = `hsla(${hue}, 70%, 80%, 0.5)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -16); ctx.lineTo(10, 0); ctx.lineTo(0, 16); ctx.lineTo(-10, 0);
  ctx.closePath(); ctx.stroke();
  ctx.shadowBlur = 0;
}

// ----- 9. SHADOW WEAVER — giant dark spider -----
function drawSpider(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 10, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Legs (8 = 4 per side)
  ctx.strokeStyle = '#2a1830'; ctx.lineWidth = 2;
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 4; i++) {
      const baseY = -6 + i * 4;
      const ph = t * 5 + i * 0.9 + (side > 0 ? Math.PI : 0);
      const midX = side * (12 + i * 1.5);
      const midY = baseY - 6 - i * 0.5;
      const tipX = side * (18 + i * 1.5 + Math.sin(ph) * 2);
      const tipY = baseY + 3 + Math.sin(ph) * 1.5;
      ctx.beginPath();
      ctx.moveTo(side * 7, baseY);
      ctx.quadraticCurveTo(midX, midY, tipX, tipY);
      ctx.stroke();
    }
  }
  // Abdomen (behind/below body)
  ctx.fillStyle = '#3a2040'; ctx.strokeStyle = '#2a1030'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(0, 6, 9, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Red hourglass
  ctx.fillStyle = '#e03030';
  ctx.beginPath();
  ctx.moveTo(-3, 3); ctx.lineTo(0, 6); ctx.lineTo(3, 3); ctx.lineTo(0, 9);
  ctx.closePath(); ctx.fill();
  // Main body (cephalothorax)
  ctx.fillStyle = '#4a2850'; ctx.strokeStyle = '#3a1840'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(0, -2, 8, 6, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Eyes (cluster of 6)
  const eyes = [[-3, -5], [-1, -6], [1, -6], [3, -5], [-2, -3.5], [2, -3.5]];
  ctx.fillStyle = '#f44'; ctx.shadowColor = '#f44'; ctx.shadowBlur = 3;
  for (const [ex, ey] of eyes) {
    ctx.beginPath(); ctx.arc(ex, ey, 1.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  // Fangs
  ctx.fillStyle = '#ddd';
  ctx.beginPath(); ctx.moveTo(-2, -1); ctx.lineTo(-2.5, 3); ctx.lineTo(-1, 0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(2, -1); ctx.lineTo(2.5, 3); ctx.lineTo(1, 0); ctx.fill();
}

// ----- 10. INFERNO DJINN — living flame spirit -----
function drawDjinn(ctx, t, m) {
  // Fire particle trail below
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const px = Math.sin(t * 3 + i * 1.5) * 6;
    const py = 10 + i * 3 + Math.sin(t * 4 + i) * 2;
    const alpha = 0.3 - i * 0.04;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle = i < 3 ? '#f80' : '#f40';
    ctx.beginPath(); ctx.arc(px, py, 3 - i * 0.3, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // Flame body (built from overlapping shapes)
  // Outer flame
  ctx.fillStyle = 'rgba(200,60,10,0.6)';
  ctx.beginPath();
  ctx.moveTo(-10, 8);
  ctx.quadraticCurveTo(-14 + Math.sin(t * 5) * 2, -4, -6 + Math.sin(t * 6) * 2, -16);
  ctx.quadraticCurveTo(0, -22 - Math.sin(t * 7) * 3, 6 + Math.sin(t * 5.5) * 2, -16);
  ctx.quadraticCurveTo(14 + Math.sin(t * 4.5) * 2, -4, 10, 8);
  ctx.closePath(); ctx.fill();
  // Mid flame
  ctx.fillStyle = 'rgba(255,140,20,0.7)';
  ctx.beginPath();
  ctx.moveTo(-7, 6);
  ctx.quadraticCurveTo(-10 + Math.sin(t * 6) * 1.5, -2, -4 + Math.sin(t * 7) * 1.5, -14);
  ctx.quadraticCurveTo(0, -18 - Math.sin(t * 8) * 2, 4 + Math.sin(t * 6.5) * 1.5, -14);
  ctx.quadraticCurveTo(10 + Math.sin(t * 5) * 1.5, -2, 7, 6);
  ctx.closePath(); ctx.fill();
  // Inner flame (bright)
  ctx.fillStyle = 'rgba(255,220,80,0.8)';
  ctx.beginPath();
  ctx.moveTo(-4, 4);
  ctx.quadraticCurveTo(-5 + Math.sin(t * 7) * 1, 0, -2 + Math.sin(t * 8) * 1, -10);
  ctx.quadraticCurveTo(0, -13 - Math.sin(t * 9) * 1.5, 2 + Math.sin(t * 7.5) * 1, -10);
  ctx.quadraticCurveTo(5 + Math.sin(t * 6) * 1, 0, 4, 4);
  ctx.closePath(); ctx.fill();
  // Eyes
  ctx.fillStyle = '#200'; ctx.shadowColor = '#f80'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.ellipse(-3, -4, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3, -4, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Flame arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.save();
    ctx.translate(side * 8, -2);
    ctx.rotate(side * (0.5 + Math.sin(t * 3 + side) * 0.3));
    ctx.fillStyle = 'rgba(255,120,20,0.6)';
    ctx.beginPath();
    ctx.moveTo(0, -2);
    ctx.quadraticCurveTo(side * 6, -3 + Math.sin(t * 5) * 1, side * 10, 0);
    ctx.quadraticCurveTo(side * 6, 3 + Math.sin(t * 4) * 1, 0, 2);
    ctx.fill();
    ctx.restore();
  }
  // Overall glow
  ctx.save();
  ctx.shadowColor = '#f80'; ctx.shadowBlur = 15;
  ctx.strokeStyle = 'rgba(255,140,20,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, -2, 14, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ----- 11. FROST KNIGHT — icy blue knight with crystalline armor -----
function drawFrost(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 12, 13, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Ice particles falling
  for (let i = 0; i < 5; i++) {
    const px = Math.sin(t * 1.5 + i * 2.1) * 14;
    const py = ((t * 20 + i * 30) % 40) - 20;
    ctx.fillStyle = 'rgba(180,220,255,0.4)';
    ctx.beginPath(); ctx.arc(px, py, 1, 0, Math.PI * 2); ctx.fill();
  }
  // Body (rectangular torso)
  ctx.fillStyle = '#4488bb'; ctx.strokeStyle = '#336699'; ctx.lineWidth = 1.5;
  ctx.fillRect(-8, -4, 16, 16); ctx.strokeRect(-8, -4, 16, 16);
  // Frost armor plates
  ctx.fillStyle = '#88ccee';
  ctx.fillRect(-9, -2, 3, 8); ctx.fillRect(6, -2, 3, 8);
  ctx.fillRect(-6, -5, 12, 3);
  // Legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 4 + (side > 0 ? Math.PI : 0);
    ctx.fillStyle = '#336699';
    ctx.fillRect(side * 4 - 2, 12 + Math.sin(ph) * 1.5, 4, 7);
  }
  // Crystalline helmet
  ctx.fillStyle = '#aaddff'; ctx.strokeStyle = '#6699cc'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-7, -4); ctx.lineTo(-8, -14); ctx.lineTo(0, -17); ctx.lineTo(8, -14); ctx.lineTo(7, -4);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Visor slit
  ctx.fillStyle = '#002244';
  ctx.fillRect(-5, -10, 10, 3);
  // Eye glow through visor
  ctx.fillStyle = '#44ddff'; ctx.shadowColor = '#44ddff'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(-2, -8.5, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -8.5, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Orbiting ice crystals (4)
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + t * 1.5;
    const cr = 20 + Math.sin(t * 2 + i) * 2;
    const cx = Math.cos(a) * cr, cy = Math.sin(a) * cr * 0.6;
    ctx.fillStyle = '#aaeeff';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 4); ctx.lineTo(cx + 2.5, cy); ctx.lineTo(cx, cy + 4); ctx.lineTo(cx - 2.5, cy);
    ctx.closePath(); ctx.fill();
  }
  // Cold blue glow
  ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 10;
  ctx.strokeStyle = 'rgba(100,180,255,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;
}

// ----- 12. PLAGUE RAT — giant brown/green mangy rat -----
function drawRat(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 10, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Plague dripping particles
  for (let i = 0; i < 4; i++) {
    const px = Math.sin(t * 2 + i * 1.8) * 8;
    const py = 6 + ((t * 15 + i * 20) % 16);
    ctx.fillStyle = 'rgba(80,160,30,0.5)';
    ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // Long pink tail curving behind
  const tw = Math.sin(t * 3) * 4;
  ctx.strokeStyle = '#cc8888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, 8); ctx.quadraticCurveTo(tw + 10, 14, tw + 18, 8 + Math.sin(t * 2) * 3); ctx.stroke();
  // Hunched oval body (brown)
  ctx.fillStyle = '#6a4830'; ctx.strokeStyle = '#4a3020'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0, 2, 12, 9, -0.15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Mangy fur texture (jagged edge)
  ctx.strokeStyle = 'rgba(80,50,25,0.5)'; ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    const r = 10 + Math.sin(t * 2 + i * 3) * 1.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.8, 2 + Math.sin(a) * r * 0.7);
    ctx.lineTo(Math.cos(a) * (r + 3), 2 + Math.sin(a) * (r * 0.7 + 2));
    ctx.stroke();
  }
  // Snout
  ctx.fillStyle = '#7a5838';
  ctx.beginPath();
  ctx.moveTo(-8, -2); ctx.lineTo(-14, -4); ctx.lineTo(-14, 0); ctx.lineTo(-8, 1);
  ctx.closePath(); ctx.fill();
  // Nose
  ctx.fillStyle = '#cc6666';
  ctx.beginPath(); ctx.arc(-14, -2, 1.5, 0, Math.PI * 2); ctx.fill();
  // Sharp teeth
  ctx.fillStyle = '#eee';
  ctx.beginPath(); ctx.moveTo(-11, -1); ctx.lineTo(-12, 1); ctx.lineTo(-10, 0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-9, 0); ctx.lineTo(-10, 2); ctx.lineTo(-8, 1); ctx.fill();
  // Tattered ears
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#5a3828';
    ctx.beginPath();
    ctx.moveTo(side * 3, -7); ctx.lineTo(side * 5 + side * 2, -14); ctx.lineTo(side * 6, -6);
    ctx.closePath(); ctx.fill();
  }
  // Eyes (red/green glow)
  ctx.fillStyle = '#ff3333'; ctx.shadowColor = '#44ff44'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.arc(-5, -4, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-1, -5, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ----- 13. THUNDER TITAN — massive golden electric titan -----
function drawThunder(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 14, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Sparks flying off
  for (let i = 0; i < 6; i++) {
    const sx = Math.sin(t * 5 + i * 2.5) * 18;
    const sy = Math.cos(t * 4 + i * 1.9) * 14;
    ctx.fillStyle = `rgba(255,255,${100 + Math.sin(t * 10 + i) * 100},0.7)`;
    ctx.beginPath(); ctx.arc(sx, sy, 1 + Math.random() * 0.5, 0, Math.PI * 2); ctx.fill();
  }
  // Legs (thick)
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 3.5 + (side > 0 ? Math.PI : 0);
    ctx.fillStyle = '#b8962a';
    ctx.fillRect(side * 5 - 3, 8 + Math.sin(ph) * 1.5, 6, 8);
    ctx.fillStyle = '#9a7a1a';
    ctx.fillRect(side * 5 - 3.5, 14 + Math.sin(ph) * 1.5, 7, 3);
  }
  // Large golden body (wide shoulders)
  ctx.fillStyle = '#d4a830'; ctx.strokeStyle = '#b08820'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-14, -2); ctx.lineTo(-12, 10); ctx.lineTo(12, 10); ctx.lineTo(14, -2);
  ctx.lineTo(10, -8); ctx.lineTo(-10, -8);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Muscular detail lines
  ctx.strokeStyle = 'rgba(150,120,30,0.4)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(0, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5, -4); ctx.quadraticCurveTo(-6, 2, -4, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5, -4); ctx.quadraticCurveTo(6, 2, 4, 8); ctx.stroke();
  // Head
  ctx.fillStyle = '#d4a830';
  ctx.beginPath(); ctx.arc(0, -12, 7, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#b08820'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, -12, 7, 0, Math.PI * 2); ctx.stroke();
  // Electric eyes
  ctx.fillStyle = '#ffffaa'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(-2.5, -13, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.5, -13, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Arms
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#c49828';
    ctx.save();
    ctx.translate(side * 14, -2);
    ctx.rotate(side * (0.3 + Math.sin(t * 2.5) * 0.15));
    ctx.fillRect(0, -2, side * 10, 4);
    // Hand orb
    ctx.fillStyle = '#ffff44'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(side * 10, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  // Lightning arcs between hands
  ctx.strokeStyle = '#ffff44'; ctx.lineWidth = 1.5; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(-20, -2);
  for (let i = 1; i <= 5; i++) {
    const lx = -20 + i * 8;
    const ly = -2 + Math.sin(t * 12 + i * 2) * 6;
    ctx.lineTo(lx, ly);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ----- 14. BLOOD KNIGHT — dark red armored vampire -----
function drawBlood(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 13, 14, 4, 0, 0, Math.PI * 2); ctx.fill();

  for (let i = 0; i < 4; i++) {

  ctx.beginPath(); ctx.arc(2, -11, 1.5, 0, Math.PI * 2); ctx.fill();

  // Fangs

// ----- 15. PHARAOH — gold/tan mummy with pharaoh headdress -----
function drawPharaoh(ctx, t, m) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 13, 13, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Glowing hieroglyph symbols floating around
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 + t * 0.8;
    const hr = 22 + Math.sin(t + i) * 3;
    const hx = Math.cos(a) * hr, hy = Math.sin(a) * hr * 0.6;
    ctx.fillStyle = `rgba(255,215,0,${0.3 + 0.2 * Math.sin(t * 3 + i)})`;
    ctx.fillRect(hx - 2, hy - 2, 4, 4);
    ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 0.5;
    ctx.strokeRect(hx - 2, hy - 2, 4, 4);
  }
  // Wrapped bandage body
  ctx.fillStyle = '#c8b080'; ctx.strokeStyle = '#a09060'; ctx.lineWidth = 1;
  ctx.fillRect(-8, -2, 16, 14); ctx.strokeRect(-8, -2, 16, 14);
  // Bandage wrapping lines
  ctx.strokeStyle = 'rgba(160,140,100,0.5)'; ctx.lineWidth = 0.8;
  for (let i = 0; i < 4; i++) {
    const by = i * 4;
    ctx.beginPath(); ctx.moveTo(-8, by); ctx.lineTo(8, by + 2); ctx.stroke();
  }
  // Legs
  for (let side = -1; side <= 1; side += 2) {
    const ph = t * 3 + (side > 0 ? Math.PI : 0);
